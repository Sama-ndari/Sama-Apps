  G.sw.title = "E-Sama - Mwongozo Kamili wa Mtumiaji";
  G.sw.subtitle = "Kila kitu unachohitaji kujua kusakinisha, kusanidi, na kutumia E-Sama kwa aina yoyote ya biashara.";
  G.sw.download_pdf = "Pakua PDF";
  G.sw.toc_title = "Yaliyomo";
  G.sw.chapters = [
  {
    id:"install", title:"Usakinishaji & Uzinduzi wa Kwanza",
    sections:[
      { title:"Jinsi ya Kupakua na Kusakinisha", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-splash.webp" alt="E-Sama Splash Screen" /><img src="../../assets/apps/esama/screenshots/esama-store-types.webp" alt="Store Types" /></div><ol><li>Pakua faili ya APK kutoka kiungo kilichotolewa na wakala wako au kutoka <a href="../../app.html?id=esama" style="color:var(--accent)">duka la Sama Apps</a>.</li><li>Ikiwa utaulizwa, ruhusu usakinishaji kutoka vyanzo visivyojulikana kwenye mipangilio yako (<b>Mipangilio \u2192 Usalama \u2192 Vyanzo visivyojulikana</b>).</li><li>Bonyeza faili iliyopakuliwa na ubonyeze <b>Sakinisha</b>.</li><li>Fungua programu. Utaona skrini ya splash na nembo ya E-Sama.</li></ol><div class="guide-tip"><i class="bi bi-info-circle"></i> Programu inafanya kazi 100% bila mtandao. Hakuna mtandao unaohitajika baada ya usakinishaji, isipokuwa kwa hifadhi ya wingu na uanzishaji wa leseni.</div>' },
      { title:"Uanzishaji wa Leseni", html:'<p>Uzinduzi wa kwanza unahitaji kuanzisha leseni yako:</p><ol><li>Skrini ya <b>Leseni</b> inaonyeshwa na tabo mbili: <b>Anzisha</b> na <b>Nunua</b>.</li><li>Ukiwa na msimbo, nenda kwenye tabo <b>Anzisha</b>, ingiza msimbo wako na ubonyeze <b>Anzisha</b>.</li><li>Kununua, nenda tabo <b>Nunua</b>: chagua <b>mpango</b> wako (Standard / Business / Premium), <b>muda</b>, ingiza <b>jina</b> lako, chagua <b>njia ya malipo</b>, na ubonyeze <b>Agiza kupitia WhatsApp</b>.</li></ol>' },
      { title:"Onboarding - Kuweka Duka Lako la Kwanza", html:'<h4>Hatua 1 - Kurejesha Wingu (Hiari)</h4><p>Ukiwa na hifadhi ya awali kwenye Google Drive, ingia na Google na uirejeshe hapa. Vinginevyo, bonyeza <b>Ruka</b>.</p><h4>Hatua 2 - Aina ya Biashara</h4><ul><li><b>Mauzo</b> - Duka, Maduka ya Dawa, Baa, cabaret, nk.</li><li><b>Mkahawa</b> - Mkahawa, Snack</li><li><b>Kukodisha</b> - Vifaa, Matukio, Sauti</li></ul><h4>Hatua 3 - Maelezo ya Duka</h4><p>Ingiza <b>jina la duka</b> na uchague <b>sarafu</b> yako. Bonyeza <b>Anza</b>.</p>' }
    ]
  },
  {
    id:"navigation", title:"Urambazaji Mkuu",
    sections:[
      { title:"Muundo wa Skrini ya Nyumbani", html:'<p>Skrini ya nyumbani ina <b>bar ya urambazaji</b> chini yenye tabo 5. Tabo zinabadilika kulingana na aina yako ya biashara.</p><h4>Hali ya Mauzo</h4><ol><li><b>Hesabu</b> - Bidhaa na hisa</li><li><b>Mauzo</b> - POS</li><li><b>Gharama</b></li><li><b>Wateja</b></li><li><b>Ripoti</b></li></ol><h4>Hali ya Mkahawa</h4><p><b>Dashibodi</b> <b>si</b> tabo ya chini: fungua kwa kubonyeza <b>nembo ya duka</b> juu, kama katika hali ya Mauzo. Chini kuna <b>tabo 5</b>:</p><ol><li><b>Viungo</b> - Malighafi (hesabu)</li><li><b>Mauzo</b> - POS sahani</li><li><b>Gharama</b></li><li><b>Wateja</b></li><li><b>Ripoti</b></li></ol><h4>Hali ya Kukodisha</h4><ol><li><b>Katalogi</b> - Vitu vya kukodisha</li><li><b>Kukodisha</b> - Zinazoendelea</li><li><b>Gharama</b></li><li><b>Wateja</b></li><li><b>Ripoti</b></li></ol><p><b>Barra ya juu</b> ina jina la duka. Bonyeza <b>nembo</b> kufungua <b>Dashibodi</b>. Bonyeza <b>gia</b> kwa Mipangilio.</p>' }
    ]
  },
  {
    id:"dashboard", title:"Dashibodi",
    sections:[
      { title:"Muhtasari", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-dashboard.webp" alt="Dashboard" /></div><div class="guide-path">Nyumbani <i class="bi bi-chevron-right"></i> Bonyeza nembo ya duka</div><p>Chagua kipindi: <b>Leo</b>, <b>Wiki hii</b>, <b>Mwezi huu</b>, au <b>Mwaka huu</b>.</p><h4>Vipimo Vikuu</h4><ul><li><b>Mapato</b>: jumla ya mauzo, na idadi ya mauzo na marudisho.</li><li><b>Faida</b>: mapato baada ya gharama, na asilimia ya margin.</li></ul><h4>Vipimo vya Ziada</h4><ul><li><b>Faida Ghafi</b>, <b>Jumla Gharama</b>, <b>Thamani ya Hisa</b>, <b>Deni la Wateja</b>.</li></ul><h4>Chati</h4><ul><li>Mwenendo wa mauzo (grafu ya mstari).</li><li>Gharama kwa jamii (chati ya duara).</li><li>Mauzo kwa njia ya malipo (chati ya duara).</li></ul><h4>Uchambuzi wa Kuvunja Usawa</h4><p>Bar ya maendeleo, gharama za kudumu, margin ya wastani, mauzo yanayohitajika.</p><h4>Mzunguko wa Hisa</h4><ul><li><b>Bidhaa bora</b>: bidhaa 5 bora kwa mauzo.</li><li><b>Bidhaa zilizolala</b>: bila mauzo kwa siku 30+.</li></ul><h4>Tahadhari</h4><ul><li>Bidhaa zilizo <b>nje ya hisa</b>.</li><li>Bidhaa zenye <b>hisa chache</b>.</li><li>Wateja wenye <b>madeni</b>.</li></ul>' },
      { title:"Kufunga Siku", html:'<div class="guide-path">Dashibodi <i class="bi bi-chevron-right"></i> Ikoni ya fedha (juu kulia)</div><h4>Muhtasari wa Mauzo</h4><ul><li>Jumla ya mauzo: <b>taslimu</b>, <b>mobile money</b>, <b>mkopo</b>.</li><li>Idadi ya mauzo na marudisho (ikihitajika).</li><li>Mauzo halisi na faida ghafi.</li></ul><h4>Gharama na Malipo ya Deni</h4><ul><li>Jumla ya gharama za siku.</li><li>Malipo ya deni yaliyopokelewa: taslimu na mobile money.</li></ul><h4>Upatanisho wa Pesa</h4><p><b>Inayotarajiwa = Pesa ya Kufungua + Mauzo Taslimu + Malipo Deni Taslimu - Gharama Taslimu - Marejesho ya Siku Zilizopita</b></p><ol><li>Ingiza <b>pesa ya kufungua</b>.</li><li>Ingiza <b>pesa ya kufunga</b> (hesabu halisi).</li><li>Programu inahesabu <b>pesa inayotarajiwa</b> na inaonyesha <b>ziada</b> au <b>upungufu</b>.</li></ol><p>Ongeza maelezo na ushiriki ripoti kama <b>maandishi</b> (WhatsApp) au <b>PDF</b> (leseni ya Business/Premium).</p>' }
    ]
  },
  {
    id:"inventory", title:"Hesabu (Inventaire)",
    sections:[
      { title:"Kuongeza Bidhaa", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-inventory-list.webp" alt="Inventory" /></div><div class="guide-path">Hesabu <i class="bi bi-chevron-right"></i> Kitufe <b>+</b></div><p>Jina, msimbo wa bar, jamii, bei (ununuzi/rejareja/jumla), kiasi cha hisa, kizingiti cha tahadhari, kitengo, tofauti.</p>' },
      { title:"Kuhariri na Kufuta", html:'<p>Bonyeza bidhaa kuona maelezo yake kamili:</p><ul><li><b>Kadi ya hisa</b>: kiasi, hali (ipo/chache/imeisha), kizingiti cha tahadhari, na thamani ya hisa.</li><li><b>Kadi ya bei</b>: bei ya ununuzi, rejareja, jumla na asilimia ya margin.</li><li><b>Kadi ya hasara</b>: hasara zote zilizorekodiwa.</li></ul><h4>Marekebisho ya Hisa</h4><p>Chini ya skrini, vitufe viwili vya kurekebisha hisa:</p><ul><li><b>Hisa Ndani</b>: ongeza hisa unapopokea bidhaa mpya.</li><li><b>Hisa Nje</b>: ondoa hisa kwa mikono (matumizi binafsi, sampuli, marekebisho).</li></ul>' },
      { title:"Tofauti na Kuhariri kwa Wingi", html:'<p>Bidhaa zenye <b>tofauti</b> (ukubwa, rangi) zinawekwa pamoja. Bonyeza bidhaa iliyowekwa pamoja kuona tofauti zake.</p><h4>Kuhariri kwa Wingi</h4><ul><li>Weka <b>bei mpya</b> kwa tofauti zote.</li><li><b>Rekebisha kwa asilimia</b> (mfano: ongeza bei zote kwa 10%).</li><li><b>Ongeza hisa</b> kwa tofauti zote mara moja.</li></ul>' },
      { title:"Hasara za Hisa", html:'<p>Kutoka skrini ya maelezo ya bidhaa, rekodi hasara. Kila hasara inajumuisha:</p><ul><li><b>Aina ya hasara</b>: imeisha muda, imevunjika, imeharibiwa, imepotea, imeibwa, rudishwa dhamana, iliyopitwa na wakati, au nyingine.</li><li><b>Kiasi</b> kilichopotea na <b>gharama kwa kila kipande</b>.</li><li><b>Maelezo</b> ya tukio.</li><li>Chaguo la <b>kuhesabu kama gharama</b>: huunda ingizo la gharama kiotomatiki.</li></ul>' }
    ]
  },
  {
    id:"sales", title:"Mauzo - POS",
    sections:[
      { title:"Kufanya Mauzo", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-pos.webp" alt="Point of Sale" /><img src="../../assets/apps/esama/screenshots/esama-cart.webp" alt="Cart" /><img src="../../assets/apps/esama/screenshots/esama-sales-history.webp" alt="Sales History" /></div><div class="guide-path">Nyumbani <i class="bi bi-chevron-right"></i> Tabo "Mauzo"</div><ol><li><b>Tafuta bidhaa</b>: tafuta, panga, chuja kwa jamii, au skani msimbo wa bar.</li><li><b>Ongeza kwenye kikapu</b>: bonyeza bidhaa. Kwa bidhaa zenye <b>tofauti</b>, paneli ya kuchagua inaonekana. Kwa bidhaa zinazouzwa kwa <b>kitengo</b> (mfano: kreti ya chupa), chagua kuuza kwa kipande au kwa kitengo kizima.</li><li><b>Rekebisha kikapu</b>: +/- kwa kiasi, punguzo kwa kila bidhaa, telezesha ili kuondoa.</li><li>Bonyeza <b>Lipa</b> kwenda ukurasa wa malipo.</li></ol>' },
      { title:"Malipo na Uthibitisho", html:'<ol><li>Chagua <b>mteja</b> (hiari).</li><li>Weka <b>punguzo</b> (% au kiasi).</li><li>Chagua <b>njia ya malipo</b>:<ul><li><b>Taslimu</b></li><li><b>Mobile Money</b></li><li><b>Mkopo</b> - inarekodiwa kama deni la mteja</li><li><b>Mchanganyiko</b> - mchanganyiko wa njia kadhaa</li></ul></li><li>Kwa taslimu, ingiza <b>kiasi kilichopokelewa</b> kuona chenji.</li><li>Bonyeza <b>Thibitisha Mauzo</b>.</li></ol>' },
      { title:"Vikapu vya Subiri", html:'<p>Weka kikapu <b>kwenye subiri</b> ikiwa mteja bado anafikiria. Rudisha baadaye kutoka orodha ya vikapu vilivyosubiriwa.</p>' },
      { title:"Historia ya Mauzo", html:'<p>Angalia mauzo yote ya zamani. Tafuta kwa mteja, bidhaa, au nambari ya ankara. Chuja kwa kipindi (Leo, Wiki hii, Mwezi huu).</p>' },
      { title:"Kurudisha na Kurejesha Pesa", html:'<p>Kutoka <b>Maelezo ya Mauzo</b>, bonyeza <b>Rudisha</b>:</p><ul><li><b>Kurudisha Kamili</b>: rudisha mauzo yote mara moja. Inapatikana kwa mipango yote.</li><li><b>Kurudisha Sehemu</b>: chagua bidhaa na kiasi maalum. Inahitaji leseni ya <b>Business</b> au <b>Premium</b>.</li></ul><p>Hisa hurejeshwa kiotomatiki kwenye hesabu.</p>' }
    ]
  },
  {
    id:"clients", title:"Wateja na Madeni",
    sections:[
      { title:"Kusimamia Wateja", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-clients.webp" alt="Clients" /></div><div class="guide-path">Nyumbani <i class="bi bi-chevron-right"></i> Tabo "Wateja"</div><p>Tafuta, panga (Jina, Deni, Manunuzi, Ziara ya Mwisho), chuja (Wote, Wenye Deni, VIP, Dhahabu, Fedha, Shaba).</p><p>Ongeza mteja: <b>Jina</b>, <b>Simu</b>, barua pepe, anwani, <b>kikomo cha mkopo</b>.</p>' },
      { title:"Maelezo ya Mteja", html:'<p>Bonyeza mteja kuona:</p><ul><li><b>Kadi ya salio</b>: kiasi cha deni na kikomo cha mkopo.</li><li><b>Takwimu</b>: jumla ya manunuzi, kiasi kilichotumika, idadi ya ziara.</li><li><b>Historia ya manunuzi</b> na <b>historia ya malipo</b>.</li><li><b>Pointi za uaminifu</b> na daraja.</li></ul><h4>Kuongeza Malipo</h4><p>Chagua njia moja (Taslimu, Mobile Money, Benki) au gawanya kwa njia nyingi. Ingiza kiasi na rejea ya hiari.</p><h4>Kuhifadhi Mteja</h4><p>Mteja anaweza kuhifadhiwa tu akiwa na <b>deni sifuri</b>.</p>' },
      { title:"Vikumbusho vya WhatsApp", html:'<p>Kutoka skrini ya <b>CRM</b> (tabo ya Vikumbusho), tuma vikumbusho vya deni kwa WhatsApp <b>mteja mmoja kwa wakati</b>: bonyeza ikoni ya WhatsApp kando ya jina la mdaiwa. Ujumbe umejazwa tayari na jina na kiasi; WhatsApp hufunguka kwa mhusika huyo.</p><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> WhatsApp hairuhusu kutuma ujumbe mmoja kwa wateja wote mara moja. Lazima ufungue na utume kwa kila mteja tofauti.</div>' }
    ]
  },
  {
    id:"crm", title:"CRM na Uaminifu",
    sections:[
      { title:"Muhtasari wa CRM", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-crm.webp" alt="CRM &amp; Loyalty" /></div><p>Tabo 4:</p><ol><li><b>VIP</b>: wateja bora kwa matumizi.</li><li><b>Kawaida</b>: wanunuzi wa mara kwa mara.</li><li><b>Vikumbusho</b>: wateja wenye madeni. Bonyeza ikoni ya <b>WhatsApp</b> kwa kumbusho kwa <b>mteja huyo tu</b>. Rudia kwa kila mdaiwa; WhatsApp haikubali kutuma kwa wote kwa hatua moja.</li><li><b>Uaminifu</b>: mipangilio na orodha ya daraja.</li></ol>' },
      { title:"Programu ya Uaminifu", html:'<h4>Viwango</h4><ul><li><b>Bronze</b>: pointi 10+.</li><li><b>Silver</b>: pointi 50+.</li><li><b>Gold</b>: pointi 200+.</li><li><b>VIP</b>: pointi 500+.</li></ul><p>Orodha ya daraja: wateja 10 bora kwa pointi. Pointi zinapatikana moja kwa moja kwa kila mauzo.</p>' }
    ]
  },
  {
    id:"expenses", title:"Gharama",
    sections:[
      { title:"Kurekodi Gharama", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-expenses.webp" alt="Expenses" /></div><div class="guide-path">Nyumbani <i class="bi bi-chevron-right"></i> Tabo "Gharama" <i class="bi bi-chevron-right"></i> <b>+</b></div><ol><li>Chagua <b>jamii</b> (Kodi, Usafiri, Vifaa, Mishahara, nk.).</li><li>Ingiza <b>kiasi</b>.</li><li>Ongeza <b>maelezo</b>.</li><li>Weka <b>tarehe</b>.</li><li>Weka kama <b>ya kurudia</b> (hiari): Kila Siku, Kila Wiki, Kila Mwezi, au Siku za Kazi.</li></ol>' },
      { title:"Kuchuja na Kutafuta", html:'<p>Tumia vichujio vya kipindi: <b>Leo</b>, <b>Wiki hii</b>, <b>Mwezi huu</b>, au <b>Tarehe maalum</b>. Chuja kwa jamii na vipu vya jamii.</p>' },
      { title:"Kuhifadhi Gharama", html:'<p>Telezesha gharama ili kuihifadhi. Kwa uhifadhi wa wingi, <b>bonyeza kwa muda mrefu</b> gharama yoyote kuingia hali ya kuchagua vingi, kisha chagua na ubonyeze <b>Hifadhi Zilizochaguliwa</b>.</p>' },
      { title:"Gharama za Kurudia", html:'<div class="guide-path">Gharama <i class="bi bi-chevron-right"></i> Ikoni ya kurudia (barra ya juu)</div><p>Angalia gharama zote za kurudia zinazoendelea. Kwa kila kiolezo: <b>Simamisha</b> (hakuna maingizo ya baadaye) au <b>Futa</b>.</p>' }
    ]
  },
  {
    id:"reports", title:"Ripoti",
    sections:[
      { title:"Muhtasari", html:'<div class="guide-screenshots"><img src="../../assets/apps/esama/screenshots/esama-reports.webp" alt="Reports" /></div><p>Chagua kipindi: Leo, Wiki hii, Mwezi huu, Mwaka huu, au Maalum. Tabo zinategemea aina ya duka lako.</p>' },
      { title:"Ripoti ya Mauzo", html:'<ul><li><b>Mapato</b>, <b>Faida</b>, <b>Idadi ya mauzo</b>, <b>Gharama</b>.</li><li>Marudisho (ikihitajika).</li><li>Mauzo kwa njia ya malipo (chati ya duara).</li><li>Bidhaa bora zilizouzwa.</li></ul>' },
      { title:"Ripoti ya Gharama", html:'<ul><li>Jumla ya gharama.</li><li>Gharama kwa jamii (chati ya duara).</li><li>Orodha ya jamii na kiasi.</li></ul>' },
      { title:"Ripoti ya Hesabu", html:'<ul><li>Thamani ya jumla ya hisa.</li><li>Idadi ya bidhaa: jumla, hisa chache, nje ya hisa.</li><li>Muhtasari wa hasara za hisa: kiasi cha jumla, idadi ya matukio, aina kuu ya hasara.</li><li>Orodha ya bidhaa zenye hisa chache.</li></ul>' },
      { title:"Ripoti ya Kukodisha", html:'<p>Inapatikana katika hali ya <b>Kukodisha</b> pekee.</p><ul><li><b>Mapato ya kukodisha</b>, <b>Amana za jumla</b>.</li><li><b>Kukodisha zinazoendelea</b> na <b>zilizochelewa</b>.</li><li><b>Ada za kuchelewa</b> na <b>ada za uharibifu</b>.</li><li>Chati: kukodisha kwa hali, vitu vilivyokodishwa zaidi.</li></ul>' },
      { title:"Kuhamisha Ripoti", html:'<p>Bonyeza <b>kitufe cha kuhamisha</b> (FAB):</p><ul><li><b>PDF</b>: hati iliyopangwa na chati na majedwali (leseni ya Business/Premium).</li><li><b>Excel</b>: faili ya <b>.xlsx</b> na data za kina kwa uchambuzi zaidi (leseni ya Business/Premium).</li><li><b>Maandishi</b>: shiriki muhtasari kupitia WhatsApp, barua pepe, nk (inapatikana kwa mipango yote).</li></ul>' },
      { title:"Ripoti za Kiotomatiki", html:'<h4>Kila Wiki</h4><ul><li>Mapato, mauzo, faida ghafi, gharama, faida halisi, margin.</li><li>Bidhaa 3 bora.</li></ul><h4>Kila Mwezi</h4><ul><li>+ kikapu cha wastani, deni la wateja, mgawanyo wa wateja, gharama kwa jamii.</li></ul><p>Kagua, shiriki kama maandishi, au hamisha kama PDF.</p>' }
    ]
  },
  {

  /* ──────────────────────────────────────────────────── */
  /*  RENDER                                              */
  /* ──────────────────────────────────────────────────── */
  var _activeSection = '';
  var _chapterIds = [];

  document.addEventListener("DOMContentLoaded", function() {
    var params = new URLSearchParams(window.location.search);
    var forceLang = params.get("lang");
    if (forceLang && G[forceLang]) setLang(forceLang);
    renderGuide();
    initScrollSpy();
    initTocInteractions();
  });

  function buildTocNav(chapters, activeId) {
    var nav = '';
    for (var i = 0; i < chapters.length; i++) {
      var cls = activeId === chapters[i].id ? ' active' : '';
      nav += '<button class="toc-btn' + cls + '" data-target="' + chapters[i].id + '"><span class="toc-num">' + (i+1) + '.</span>' + chapters[i].title + '</button>';
    }
    return nav;
  }

  function renderSidebar(g, activeId) {
    var sb = document.getElementById("sidebarToc");
    sb.innerHTML = '<div class="guide-sidebar-card"><div class="guide-sidebar-header"><h3><i class="bi bi-list"></i> ' + g.toc_title + '</h3><button onclick="window.print()" aria-label="PDF"><i class="bi bi-download"></i></button></div><nav class="toc-nav">' + buildTocNav(g.chapters, activeId) + '</nav></div>';
  }

  function renderMobileToc(g, activeId) {
    var mc = document.getElementById("tocModalContent");
    mc.innerHTML = '<div class="toc-modal-header"><h3>' + g.toc_title + '</h3><button id="tocModalClose" aria-label="Close"><i class="bi bi-x-lg"></i></button></div><nav class="toc-nav">' + buildTocNav(g.chapters, activeId) + '</nav>';
  }

  function updateActiveToc(newId) {
    if (newId === _activeSection) return;
    _activeSection = newId;
    document.querySelectorAll('.toc-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-target') === newId);
    });
  }

  function getElementPageTop(el) {
    var top = 0;
    while (el) { top += el.offsetTop; el = el.offsetParent; }
    return top;
  }

  function scrollToChapter(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var top = getElementPageTop(el) - 100;
    window.scrollTo({ top: top, behavior: 'smooth' });
    document.getElementById("tocModal").classList.remove("open");
  }

  function initScrollSpy() {
    var ticking = false;
    window.addEventListener('scroll', function() {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(function() {
        var scrollY = window.scrollY;
        document.getElementById("backTopBtn").classList.toggle("visible", scrollY > 500);
        var pos = scrollY + 150;
        for (var i = _chapterIds.length - 1; i >= 0; i--) {
          var el = document.getElementById(_chapterIds[i]);
          if (el && getElementPageTop(el) <= pos) { updateActiveToc(_chapterIds[i]); break; }
        }
        ticking = false;
      });
    });
  }

  function initTocInteractions() {
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.toc-btn');
      if (btn) { e.preventDefault(); scrollToChapter(btn.getAttribute('data-target')); return; }
      if (e.target.closest('#tocFab')) { document.getElementById("tocModal").classList.add("open"); return; }
      if (e.target.closest('#backTopBtn')) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      if (e.target.closest('#tocModalClose')) { document.getElementById("tocModal").classList.remove("open"); return; }
      if (e.target.id === 'tocModal') { document.getElementById("tocModal").classList.remove("open"); }
    });
  }

  function renderGuide() {
    var lang = getLang();
    if (!G[lang]) lang = "en";
    var g = G[lang];
    var el = document.getElementById("guideContent");
    _chapterIds = g.chapters.map(function(ch) { return ch.id; });

    var h = '<div class="guide-meta"><img src="../../assets/apps/esama/icon.webp" alt="E-Sama" /><span>' + g.title + '</span></div>';
    h += '<h1>' + g.title + '</h1>';
    h += '<p style="color:var(--text-muted);margin-bottom:20px">' + g.subtitle + '</p>';

    h += '<div class="lang-tabs">';
    ["en","fr","sw"].forEach(function(l) {
      var label = l==="en"?"English":l==="fr"?"Fran\u00e7ais":"Kiswahili";
      h += '<a href="?lang=' + l + '" class="lang-tab' + (lang===l?" active":"") + '">' + label + '</a>';
    });
    h += '</div>';

    h += '<div class="guide-download">';
    h += '<a href="#" onclick="window.print();return false;" class="dl-btn"><i class="bi bi-file-earmark-pdf"></i> ' + g.download_pdf + ' (' + lang.toUpperCase() + ')</a>';
    h += '</div>';

    for (var i = 0; i < g.chapters.length; i++) {
      var ch = g.chapters[i];
      h += '<div class="guide-chapter" id="' + ch.id + '">';
      h += '<h2><span class="num">' + (i+1) + '</span> ' + ch.title + '</h2>';
      for (var j = 0; j < ch.sections.length; j++) {
        var s = ch.sections[j];
        h += '<div class="guide-section"><h3>' + s.title + '</h3>' + s.html + '</div>';
      }
      h += '</div>';
    }
    el.innerHTML = h;

    _activeSection = _chapterIds[0] || '';
    renderSidebar(g, _activeSection);
    renderMobileToc(g, _activeSection);
  }
  </script>
