  <script>
  var G = { en:{}, fr:{} };

  G.en.title = "FabWash: Complete User Guide";
  G.en.subtitle = "Carwash management: vehicles, invoices, expenses, washer salaries, loyalty, and Firebase sync.";
  G.en.download_pdf = "Download PDF";
  G.en.toc_title = "Table of Contents";
  G.en.chapters = [
  {
    id:"install", title:"Installation & first launch",
    sections:[
      { title:"Download and install", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-login.webp" width="280" height="606" alt="FabWash sign-in" loading="lazy" decoding="async" /></div><ol><li>Get the APK from your agent or <a href="../../app.html?id=fabwash" style="color:var(--accent)">the Sama Apps store</a>.</li><li>If Android asks, allow installation from unknown sources.</li><li>Install, then open FabWash.</li></ol><div class="guide-tip"><i class="bi bi-info-circle"></i> FabWash is offline-first: data is stored on the device (Hive). Firebase Firestore sync runs when the network is available.</div>' },
      { title:"What you need", html:'<p>A stable device for daily operations, and (optional) a Bluetooth thermal printer if you print POS-style receipts. PDF invoices can be shared without a printer.</p>' }
    ]
  },
  {
    id:"roles", title:"Roles, PIN & sign-in",
    sections:[
      { title:"Admin and cashier", html:'<p>FabWash separates <b>Admin</b> and <b>Cashier</b> roles. Admins configure prices, salary rules, loyalty, and see the full dashboard. Cashiers focus on registering vehicles and completing washes.</p><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> Protect PINs: anyone with a PIN can act as that role on the device.</div>' },
      { title:"PIN authentication", html:'<p>Roles use <b>PIN</b> sign-in instead of bulky passwords—fast at the lane. Follow on-screen prompts to select role and enter the correct PIN.</p>' }
    ]
  },
  {
    id:"navigation", title:"Main navigation",
    sections:[
      { title:"Home and dashboard", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-dashboard.webp" width="280" height="606" alt="Dashboard" loading="lazy" decoding="async" /></div><div class="guide-path">Open app <i class="bi bi-chevron-right"></i> Dashboard / home</div><p>From the main area you reach daily operational screens: registering vehicles, listing today\u2019s work, reviewing totals, and opening settings. Exact tab labels match your installed language (<b>French</b> / <b>English</b>).</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Cashiers can use a dedicated language preference where the admin enables it.</div>' }
    ]
  },
  {
    id:"vehicles", title:"Vehicle registration",
    sections:[
      { title:"Four-step registration flow", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-registration.webp" width="280" height="606" alt="Registration" loading="lazy" decoding="async" /><img src="../../assets/apps/fabwash/screenshots/fabwash-vehicle-list.webp" width="280" height="606" alt="Vehicle list" loading="lazy" decoding="async" /></div><p>New visits follow four steps:</p><ol><li><b>Plate number</b> — enter the plate; the app can suggest loyalty history for returning plates.</li><li><b>Vehicle type</b> — choose the category that matches pricing.</li><li><b>Wash type</b> — pick services; pricing updates from your configured grid.</li><li><b>Washer assignment</b> — assign the washer (commission accrues to them for reporting).</li></ol><p>Use the vehicle list to review today\u2019s queue and open a record for edits or invoicing.</p>' },
      { title:"Client detail", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-client-detail.webp" width="280" height="606" alt="Client detail" loading="lazy" decoding="async" /></div><p>Open a client or visit record to see history, loyalty progress, and actions tied to that plate.</p>' }
    ]
  },
  {
    id:"invoices", title:"Invoices & receipts",
    sections:[
      { title:"PDF and thermal printing", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-invoice.webp" width="280" height="606" alt="Invoice" loading="lazy" decoding="async" /></div><p>Generate a <b>PDF invoice</b> with your company branding where configured. For lane speed, use the <b>thermal POS receipt</b> layout with a compatible <b>Bluetooth</b> printer.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Keep printer firmware and pairing reliable; test a sample receipt before peak hours.</div>' }
    ]
  },
  {
    id:"expenses", title:"Daily expenses",
    sections:[
      { title:"Categories", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-expenses.webp" width="280" height="606" alt="Expenses" loading="lazy" decoding="async" /></div><p>Record expenses by category, for example: <b>ration</b>, <b>washer salary</b>, <b>cashier salary</b>, <b>infrastructure</b>, and <b>other</b>. Consistent categorization improves end-of-day and monthly reports.</p>' }
    ]
  },
  {
    id:"team", title:"Employees & salaries",
    sections:[
      { title:"Washer commissions", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-employees.webp" width="280" height="606" alt="Employees" loading="lazy" decoding="async" /></div><p>Each washer earns a configurable <b>percentage</b> of the revenue attributed to them (commonly around <b>30%</b> by default). Manage staff records and payouts from the employees area.</p>' }
    ]
  },
  {
    id:"reports", title:"Reports",
    sections:[
      { title:"Daily summary", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-reports.webp" width="280" height="606" alt="Reports" loading="lazy" decoding="async" /></div><p>Daily reports combine vehicle counts, <b>revenue</b>, <b>expenses</b>, <b>salaries</b>, <b>net</b>, and a per-washer breakdown. Share summaries via <b>WhatsApp</b> when you need a quick handoff to the owner or accountant.</p>' }
    ]
  },
  {
    id:"loyalty", title:"Loyalty program",
    sections:[
      { title:"Visits and free wash", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-loyalty.webp" width="280" height="606" alt="Loyalty" loading="lazy" decoding="async" /></div><p>The program tracks visits by <b>plate number</b>. After a configurable number of visits (for example every <b>10</b>), the customer earns a free wash. Thresholds are adjustable in admin settings.</p>' }
    ]
  },
  {
    id:"settings_sync", title:"Admin settings & sync",
    sections:[
      { title:"Pricing and rules", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-settings.webp" width="280" height="606" alt="Settings" loading="lazy" decoding="async" /></div><p>Admins maintain the <b>pricing grid</b>, <b>salary percentages</b>, <b>loyalty thresholds</b>, and business profile data such as logo for invoices.</p>' },
      { title:"Cloud sync status", html:'<p>When online, FabWash syncs to <b>Firebase Firestore</b>. A <b>sync indicator</b> in the app bar shows state. If you are offline, operations continue locally and sync when connectivity returns.</p><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> Avoid manual device clock changes; license and business logic may depend on correct time.</div>' }
    ]
  }
  ];

  G.fr.title = "FabWash : guide complet";
  G.fr.subtitle = "Gestion carwash : v\u00e9hicules, factures, d\u00e9penses, salaires laveurs, fid\u00e9lit\u00e9 et synchro Firebase.";
  G.fr.download_pdf = "T\u00e9l\u00e9charger PDF";
  G.fr.toc_title = "Sommaire";
  G.fr.chapters = [
  {
    id:"install", title:"Installation & premier lancement",
    sections:[
      { title:"T\u00e9l\u00e9charger et installer", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-login.webp" width="280" height="606" alt="Connexion FabWash" loading="lazy" decoding="async" /></div><ol><li>R\u00e9cup\u00e9rez l\u2019APK via votre agent ou <a href="../../app.html?id=fabwash" style="color:var(--accent)">la boutique Sama Apps</a>.</li><li>Si Android le demande, autorisez les sources inconnues.</li><li>Installez puis ouvrez FabWash.</li></ol><div class="guide-tip"><i class="bi bi-info-circle"></i> FabWash est <b>hors ligne d\u2019abord</b> : donn\u00e9es sur l\u2019appareil (Hive). La synchro Firebase Firestore s\u2019ex\u00e9cute quand le r\u00e9seau est disponible.</div>' },
      { title:"Pr\u00e9requis", html:'<p>Un t\u00e9l\u00e9phone ou tablette fiable pour la journ\u00e9e, et (optionnel) une imprimante thermique Bluetooth pour les re\u00e7us de caisse. Les factures PDF se partagent sans imprimante.</p>' }
    ]
  },
  {
    id:"roles", title:"R\u00f4les, code PIN & connexion",
    sections:[
      { title:"Admin et caissier", html:'<p>FabWash s\u00e9pare les r\u00f4les <b>Admin</b> et <b>Caissier</b>. L\u2019admin configure les prix, r\u00e8gles de salaire, fid\u00e9lit\u00e9 et voit le tableau de bord complet. Le caissier enregistre les v\u00e9hicules et valide les lavages.</p><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> Prot\u00e9gez les codes PIN : toute personne qui conna\u00eet un PIN peut agir sous ce r\u00f4le.</div>' },
      { title:"Authentification par PIN", html:'<p>La connexion se fait par <b>code PIN</b> pour aller vite au lavage. Suivez l\u2019\u00e9cran pour choisir le r\u00f4le et saisir le PIN.</p>' }
    ]
  },
  {
    id:"navigation", title:"Navigation principale",
    sections:[
      { title:"Accueil et tableau de bord", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-dashboard.webp" width="280" height="606" alt="Tableau de bord" loading="lazy" decoding="async" /></div><div class="guide-path">Ouverture app <i class="bi bi-chevron-right"></i> Accueil / tableau de bord</div><p>Depuis l\u2019accueil vous acc\u00e9dez aux \u00e9crans op\u00e9rationnels : enregistrer les v\u00e9hicules, liste du jour, totaux et r\u00e9glages. Les libell\u00e9s suivent la langue install\u00e9e (<b>Fran\u00e7ais</b> / <b>Anglais</b>).</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Le caissier peut avoir une langue d\u2019interface d\u00e9di\u00e9e si l\u2019admin l\u2019active.</div>' }
    ]
  },
  {
    id:"vehicles", title:"Enregistrement v\u00e9hicule",
    sections:[
      { title:"Flux en 4 \u00e9tapes", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-registration.webp" width="280" height="606" alt="Enregistrement" loading="lazy" decoding="async" /><img src="../../assets/apps/fabwash/screenshots/fabwash-vehicle-list.webp" width="280" height="606" alt="Liste v\u00e9hicules" loading="lazy" decoding="async" /></div><p>Chaque passage suit quatre \u00e9tapes :</p><ol><li><b>Plaque</b> \u2014 saisie ; suggestion d\u2019historique fid\u00e9lit\u00e9 pour les clients connus.</li><li><b>Type de v\u00e9hicule</b> \u2014 cat\u00e9gorie pour la grille tarifaire.</li><li><b>Type de lavage</b> \u2014 services ; le prix refl\u00e8te votre configuration admin.</li><li><b>Affectation laveur</b> \u2014 attribution ; la commission se rapporte à ce laveur dans les bilans.</li></ol><p>La liste des v\u00e9hicules sert à suivre la file et ouvrir un dossier pour facture ou modification.</p>' },
      { title:"D\u00e9tail client", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-client-detail.webp" width="280" height="606" alt="D\u00e9tail client" loading="lazy" decoding="async" /></div><p>Ouvrez un client ou un passage pour voir l\u2019historique, la progression fid\u00e9lit\u00e9 et les actions li\u00e9es \u00e0 la plaque.</p>' }
    ]
  },
  {
    id:"invoices", title:"Factures & re\u00e7us",
    sections:[
      { title:"PDF et imprimante thermique", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-invoice.webp" width="280" height="606" alt="Facture" loading="lazy" decoding="async" /></div><p>G\u00e9n\u00e9rez une <b>facture PDF</b> avec le logo entreprise si configur\u00e9. Pour le guichet, utilisez le format <b>re\u00e7u thermique POS</b> avec une imprimante <b>Bluetooth</b> compatible.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Testez un re\u00e7u exemple avant les heures de pointe pour v\u00e9rifier l\u2019appairage.</div>' }
    ]
  },
  {
    id:"expenses", title:"D\u00e9penses quotidiennes",
    sections:[
      { title:"Cat\u00e9gories", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-expenses.webp" width="280" height="606" alt="D\u00e9penses" loading="lazy" decoding="async" /></div><p>Enregistrez les d\u00e9penses par cat\u00e9gorie : <b>ration</b>, <b>salaire laveur</b>, <b>salaire caissier</b>, <b>infrastructure</b>, <b>autre</b>. Des cat\u00e9gories coh\u00e9rentes am\u00e9liorent cl\u00f4ture et rapports mensuels.</p>' }
    ]
  },
  {
    id:"team", title:"Employ\u00e9s & salaires",
    sections:[
      { title:"Commissions laveurs", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-employees.webp" width="280" height="606" alt="Employ\u00e9s" loading="lazy" decoding="async" /></div><p>Chaque laveur re\u00e7oit un <b>pourcentage</b> configurable du chiffre qui lui est attribu\u00e9 (souvent ~<b>30 %</b> par d\u00e9faut). G\u00e9rez les fiches et paiements depuis l\u2019\u00e9cran employ\u00e9s.</p>' }
    ]
  },
  {
    id:"reports", title:"Rapports",
    sections:[
      { title:"Bilan journalier", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-reports.webp" width="280" height="606" alt="Rapports" loading="lazy" decoding="async" /></div><p>Le rapport jour agr\u00e8ge passages, <b>revenus</b>, <b>d\u00e9penses</b>, <b>salaires</b>, <b>net</b> et le d\u00e9tail par laveur. Partage rapide via <b>WhatsApp</b> vers le patron ou la compta.</p>' }
    ]
  },
  {
    id:"loyalty", title:"Programme fid\u00e9lit\u00e9",
    sections:[
      { title:"Passages et lavage gratuit", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-loyalty.webp" width="280" height="606" alt="Fid\u00e9lit\u00e9" loading="lazy" decoding="async" /></div><p>Les visites suivent la <b>plaque</b>. Apr\u00e8s un nombre configurable de passages (ex. <b>10</b>), le client obtient un lavage gratuit. Les seuils se r\u00e8glent c\u00f4t\u00e9 admin.</p>' }
    ]
  },
  {
    id:"settings_sync", title:"Param\u00e8tres admin & synchro",
    sections:[
      { title:"Tarifs et r\u00e8gles", html:'<div class="guide-screenshots"><img src="../../assets/apps/fabwash/screenshots/fabwash-settings.webp" width="280" height="606" alt="Param\u00e8tres" loading="lazy" decoding="async" /></div><p>L\u2019admin tient à jour la <b>grille tarifaire</b>, les <b>pourcentages de salaire</b>, les <b>seuils fid\u00e9lit\u00e9</b> et les infos soci\u00e9t\u00e9 (ex. logo sur facture).</p>' },
      { title:"\u00c9tat de synchronisation", html:'<p>En ligne, FabWash synchronise vers <b>Firebase Firestore</b>. Un <b>indicateur</b> dans la barre indique l\u2019\u00e9tat. Hors ligne, l\u2019app continue localement puis synchronise au retour r\u00e9seau.</p><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i>\u00c9vitez de modifier manuellement l\u2019heure syst\u00e8me ; la licence et la logique m\u00e9tier en d\u00e9pendent.</div>' }
    ]
  }
  ];

    G: G,
    icon: "../../assets/apps/fabwash/icon.webp",

  });
