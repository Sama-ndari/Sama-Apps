  G.fr.title = "Velora : Guide d\u2019utilisation complet";
  G.fr.subtitle = "Tout ce qu\u2019il faut savoir pour installer, configurer et ma\u00eetriser Velora pour votre productivit\u00e9 et bien-\u00eatre.";
  G.fr.download_pdf = "T\u00e9l\u00e9charger le PDF";
  G.fr.toc_title = "Table des mati\u00e8res";
  G.fr.chapters = [
  {
    id:"install", title:"Installation et premier lancement",
    sections:[
      { title:"Comment t\u00e9l\u00e9charger et installer", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-splash.webp" alt="Velora Splash Screen" /></div><ol><li>T\u00e9l\u00e9chargez le fichier APK depuis le lien fourni ou depuis <a href="../../app.html?id=velora" style="color:var(--accent)">le store Sama Apps</a>.</li><li>Si demand\u00e9, autorisez l\u2019installation depuis des sources inconnues : <b>Param\u00e8tres \u2192 S\u00e9curit\u00e9 \u2192 Sources inconnues</b>.</li><li>Appuyez sur le fichier t\u00e9l\u00e9charg\u00e9 et appuyez sur <b>Installer</b>.</li><li>Ouvrez l\u2019application.</li></ol><div class="guide-tip"><i class="bi bi-info-circle"></i> Velora fonctionne 100% hors ligne. Aucune connexion n\u2019est n\u00e9cessaire sauf pour la sauvegarde cloud, l\u2019activation de licence et les fonctions IA.</div>' },
      { title:"\u00c9cran de d\u00e9marrage", html:'<p>Lorsque Velora s\u2019ouvre, un \u00e9cran de d\u00e9marrage anim\u00e9 appara\u00eet avec une transition de couleurs, le logo de l\u2019application, une barre de progression et le num\u00e9ro de version. Pendant ce temps, l\u2019application effectue plusieurs v\u00e9rifications dans l\u2019ordre :</p><ol><li><b>Notification d\u2019alarme</b> : v\u00e9rifie s\u2019il y a une alarme en attente.</li><li><b>Configuration distante et liste noire</b> : v\u00e9rifie que l\u2019appareil n\u2019est pas bloqu\u00e9.</li><li><b>Mise \u00e0 jour forc\u00e9e</b> : v\u00e9rifie si une mise \u00e0 jour obligatoire est disponible.</li><li><b>Falsification de l\u2019horloge</b> : s\u2019assure que l\u2019horloge de l\u2019appareil n\u2019a pas \u00e9t\u00e9 modifi\u00e9e.</li><li><b>Onboarding</b> : affiche l\u2019assistant de configuration si c\u2019est le premier lancement.</li><li><b>Licence</b> : valide votre statut d\u2019activation.</li><li><b>Verrouillage biom\u00e9trique ou PIN</b> : demande l\u2019authentification si la s\u00e9curit\u00e9 est activ\u00e9e.</li><li><b>Tableau de bord</b> : charge l\u2019\u00e9cran principal une fois toutes les v\u00e9rifications r\u00e9ussies.</li></ol>' },
      { title:"Activation de la licence", html:'<p>L\u2019\u00e9cran de licence affiche le logo, le titre "Velora" et votre ID Appareil en bas. Il comporte deux onglets :</p><h4>Onglet Acheter (par d\u00e9faut)</h4><p>Cet onglet vous permet d\u2019acheter une licence :</p><ul><li><b>Cartes de forfait</b> : choisissez entre <b>Standard</b> (ic\u00f4ne fus\u00e9e) ou <b>IA</b> (ic\u00f4ne \u00e9toile avec badge "Populaire").</li><li><b>Curseur de dur\u00e9e</b> : de 1 \u00e0 12 mois. Puces rapides disponibles pour 1, 3, 6 et 12 mois.</li><li><b>R\u00e9sum\u00e9 du prix</b> : total et \u00e9conomies pour les dur\u00e9es plus longues.</li><li><b>Paiement</b> : via Lumicash.</li><li><b>Champ Nom</b> : entrez votre nom pour la commande.</li><li><b>Bouton "Commander via WhatsApp"</b> : envoie vos d\u00e9tails de commande sur WhatsApp.</li><li><b>ID Appareil</b> : affich\u00e9 en bas pour r\u00e9f\u00e9rence.</li></ul><h4>Onglet Activer</h4><ul><li>Une ic\u00f4ne cadenas et un champ de saisie pour le code d\u2019activation \u00e0 8 caract\u00e8res (police monospace).</li><li>Appuyez sur <b>"D\u00e9verrouiller"</b> pour activer votre licence.</li><li>Votre ID Appareil est affich\u00e9 en bas. Appuyez dessus pour le copier.</li></ul>' },
      { title:"Onboarding (4 \u00e9tapes)", html:'<p>Apr\u00e8s l\u2019activation de la licence lors du premier lancement, un assistant de configuration en 4 \u00e9tapes vous guide :</p><h4>\u00c9tape 1 : Bienvenue et langue</h4><p>Choisissez votre langue pr\u00e9f\u00e9r\u00e9e : anglais ou fran\u00e7ais. L\u2019interface compl\u00e8te change instantan\u00e9ment.</p><h4>\u00c9tape 2 : Restauration cloud (optionnel)</h4><p>Connectez-vous avec votre compte Google pour restaurer les donn\u00e9es d\u2019une sauvegarde pr\u00e9c\u00e9dente. Vous pouvez aussi sauter cette \u00e9tape et la configurer plus tard.</p><h4>\u00c9tape 3 : Noms du tableau de bord</h4><p>Ajoutez un ou plusieurs noms qui apparaissent dans la salutation du tableau de bord. Par exemple, si vous ajoutez "Alex", le tableau affichera "Bonjour, Alex."</p><h4>\u00c9tape 4 : Profil</h4><p>Entrez votre pr\u00e9nom et nom de famille. Vous pouvez ajouter d\u2019autres d\u00e9tails (date de naissance, email, adresse, devise) plus tard dans Param\u00e8tres \u2192 Profil.</p>' }
    ]
  },
  {
    id:"navigation", title:"Navigation principale",
    sections:[
      { title:"Barre de navigation inf\u00e9rieure", html:'<p>L\u2019\u00e9cran d\u2019accueil dispose d\u2019une <b>barre de navigation en bas</b> avec 5 onglets :</p><ol><li><b>T\u00e2ches</b> : votre liste compl\u00e8te de t\u00e2ches avec regroupement et filtres.</li><li><b>D\u00e9penses</b> : suivi des d\u00e9penses avec graphiques et budgets.</li><li><b>Dettes</b> : gestion des dettes avec paiements partiels.</li><li><b>Habitudes</b> : suivi des habitudes avec s\u00e9ries et statistiques.</li><li><b>Plus</b> : ouvre un menu radial anim\u00e9 avec 4 mini boutons d\u2019action.</li></ol>' },
      { title:"L\u2019onglet Plus : Menu radial", html:'<p>Appuyer sur l\u2019onglet <b>Plus</b> dans la barre de navigation n\u2019ouvre pas directement un \u00e9cran. Au lieu de cela, un <b>menu radial anim\u00e9</b> s\u2019ouvre en \u00e9ventail avec 4 mini boutons d\u2019action flottants :</p><ul><li><b>Notes</b> : ouvre l\u2019\u00e9cran des notes.</li><li><b>Eau</b> : ouvre le suivi d\u2019hydratation.</li><li><b>Journal (SoulSync)</b> : ouvre le journal intime.</li><li><b>Objectifs</b> : ouvre l\u2019\u00e9cran des objectifs.</li></ul><p>Appuyez sur l\u2019un des 4 boutons pour acc\u00e9der \u00e0 la fonctionnalit\u00e9, ou appuyez en dehors du menu pour le fermer.</p>' },
      { title:"Barre sup\u00e9rieure", html:'<p>La barre sup\u00e9rieure est toujours visible sur l\u2019\u00e9cran d\u2019accueil et contient de gauche \u00e0 droite :</p><ul><li><b>Ic\u00f4ne Tableau de bord</b> (extr\u00eame gauche) : ouvre le tableau de bord avec votre aper\u00e7u quotidien.</li><li><b>Ic\u00f4ne Analytiques</b> : ouvre les analytiques avanc\u00e9es avec graphiques et tendances.</li><li><b>Titre "Velora"</b> : affich\u00e9 au centre.</li><li><b>Ic\u00f4ne Recherche</b> : ouvre la recherche globale dans toutes vos donn\u00e9es.</li><li><b>Ic\u00f4ne Hub IA</b> : ouvre le hub des fonctionnalit\u00e9s IA.</li><li><b>Menu (\u22ee)</b> : un menu contextuel avec des options suppl\u00e9mentaires : <b>Contacts</b>, <b>Calendrier</b>, <b>Pomodoro</b>, <b>Param\u00e8tres</b> et <b>Basculer le th\u00e8me</b> (alterner entre mode clair et sombre).</li></ul>' }
    ]
  },
  {
    id:"dashboard", title:"Tableau de bord",
    sections:[
      { title:"Aper\u00e7u", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-dashboard.webp" alt="Dashboard" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Ic\u00f4ne Tableau de bord (en haut \u00e0 gauche)</div><p>Le tableau de bord est votre centre de commande personnel. En haut, une salutation personnalis\u00e9e affiche votre nom et la date du jour, suivie d\u2019une citation d\u2019<b>Inspiration quotidienne</b> qui change chaque jour.</p>' },
      { title:"Actions rapides", html:'<p>Sous la salutation, quatre boutons d\u2019actions rapides vous permettent d\u2019acc\u00e9der directement aux t\u00e2ches courantes :</p><ul><li><b>Ajouter D\u00e9pense</b> : ouvre directement le formulaire de cr\u00e9ation de d\u00e9pense.</li><li><b>Journal</b> : ouvre SoulSync pour \u00e9crire une nouvelle entr\u00e9e.</li><li><b>Habitudes</b> : navigue vers l\u2019onglet Habitudes.</li><li><b>Focus</b> : lance le minuteur Pomodoro pour une session de productivit\u00e9.</li></ul>' },
      { title:"Statistiques rapides et suggestions", html:'<p>La section <b>Statistiques rapides</b> affiche un aper\u00e7u de votre journ\u00e9e :</p><ul><li>T\u00e2ches termin\u00e9es aujourd\u2019hui.</li><li>Progression de l\u2019hydratation.</li><li>D\u00e9penses totales du jour.</li><li>S\u00e9ries d\u2019habitudes en cours.</li><li>Pourcentage de progression des objectifs.</li></ul><p>En bas du tableau de bord, les <b>suggestions intelligentes</b> proposent des actions selon vos donn\u00e9es, par exemple :</p><ul><li>Consulter les t\u00e2ches en retard lorsqu\u2019il en reste.</li><li>Boire de l\u2019eau si votre consommation est sous l\u2019objectif.</li><li>Compl\u00e9ter une habitude pr\u00e9vue aujourd\u2019hui.</li><li>Enregistrer des d\u00e9penses si aucune n\u2019a \u00e9t\u00e9 saisie aujourd\u2019hui.</li><li>\u00c9crire une entr\u00e9e de journal si vous n\u2019en avez pas r\u00e9dig\u00e9e r\u00e9cemment.</li></ul><p>Appuyer sur <b>"Toutes les fonctionnalit\u00e9s"</b> en bas vous ram\u00e8ne \u00e0 l\u2019\u00e9cran d\u2019accueil principal.</p>' }
    ]
  },
  {
    id:"tasks", title:"T\u00e2ches",
    sections:[
      { title:"Consulter les t\u00e2ches", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-tasks.webp" alt="Tasks" /><img src="../../assets/apps/velora/screenshots/velora-tasks-fab.webp" alt="Quick Add Menu" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet "T\u00e2ches"</div><p>Les t\u00e2ches sont organis\u00e9es dans les groupes suivants :</p><ul><li><b>En retard</b> : les t\u00e2ches pass\u00e9es qui sont automatiquement report\u00e9es \u00e0 aujourd\u2019hui.</li><li><b>Aujourd\u2019hui</b> : les t\u00e2ches pr\u00e9vues pour aujourd\u2019hui.</li><li><b>Demain</b> : les t\u00e2ches pr\u00e9vues pour demain.</li><li><b>\u00c0 venir</b> : les t\u00e2ches pr\u00e9vues dans les jours et semaines \u00e0 venir.</li><li><b>Termin\u00e9es</b> : les t\u00e2ches que vous avez d\u00e9j\u00e0 compl\u00e9t\u00e9es.</li></ul><p>Chaque carte de t\u00e2che affiche le titre, la date d\u2019\u00e9ch\u00e9ance, l\u2019indicateur de priorit\u00e9 et le type (ponctuelle ou r\u00e9currente).</p>' },
      { title:"Cr\u00e9er une t\u00e2che", html:'<div class="guide-path">T\u00e2ches <i class="bi bi-chevron-right"></i> Bouton <b>+</b> (en bas \u00e0 droite)</div><ol><li>Entrez un <b>titre</b> (obligatoire) et une <b>description</b> optionnelle.</li><li>D\u00e9finissez la <b>date et l\u2019heure d\u2019\u00e9ch\u00e9ance</b>.</li><li>Activez le <b>Rappel</b> si vous souhaitez une notification \u00e0 l\u2019heure pr\u00e9vue.</li><li>Choisissez le <b>type</b> :<ul><li><b>Ponctuelle</b> : une t\u00e2che unique.</li><li><b>R\u00e9currente</b> : se r\u00e9p\u00e8te selon un calendrier. Choisissez <b>Quotidienne</b>, <b>Hebdomadaire</b> ou <b>Mensuelle</b>.</li></ul></li><li>D\u00e9finissez la <b>priorit\u00e9</b> : Basse, Moyenne ou Haute. Les t\u00e2ches de priorit\u00e9 \u00e9lev\u00e9e affichent un indicateur color\u00e9.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol>' },
      { title:"G\u00e9rer les t\u00e2ches", html:'<p>Vous pouvez g\u00e9rer les t\u00e2ches avec les gestes et actions suivants :</p><ul><li><b>Terminer une t\u00e2che</b> : cochez la case sur la carte de la t\u00e2che.</li><li><b>Voir les d\u00e9tails</b> : appuyez sur une carte pour ouvrir un <b>panneau de d\u00e9tails</b> affichant la priorit\u00e9, la date d\u2019\u00e9ch\u00e9ance, l\u2019heure de rappel, le type et le statut. Depuis ce panneau, vous pouvez <b>Marquer comme termin\u00e9e</b>, <b>Modifier</b> ou <b>Supprimer</b> la t\u00e2che.</li><li><b>Supprimer une t\u00e2che</b> : glissez la carte vers la gauche. Un bouton <b>Annuler</b> appara\u00eet bri\u00e8vement.</li></ul>' },
      { title:"T\u00e2ches r\u00e9currentes", html:'<p>Lorsque vous terminez une t\u00e2che r\u00e9currente, Velora cr\u00e9e automatiquement une nouvelle instance pour la prochaine occurrence (quotidienne, hebdomadaire ou mensuelle). Le mod\u00e8le r\u00e9current original est masqu\u00e9 de la liste pour ne pas encombrer votre vue. Seule l\u2019instance active est visible.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Les t\u00e2ches r\u00e9currentes garantissent que vous n\u2019oubliez jamais vos responsabilit\u00e9s r\u00e9p\u00e9titives. Terminez l\u2019instance d\u2019aujourd\u2019hui, et celle de demain est d\u00e9j\u00e0 pr\u00eate.</div>' },
      { title:"Filtres de t\u00e2ches", html:'<div class="guide-path">T\u00e2ches <i class="bi bi-chevron-right"></i> Ic\u00f4ne filtre (barre sup\u00e9rieure)</div><p>Appuyez sur l\u2019ic\u00f4ne de filtre pour affiner votre liste. Filtres disponibles :</p><ul><li><b>Statut</b> : Toutes, En attente, Termin\u00e9es, En retard, Aujourd\u2019hui, R\u00e9currentes.</li><li><b>Type</b> : Ponctuelle ou R\u00e9currente.</li><li><b>Priorit\u00e9</b> : Basse, Moyenne, Haute.</li><li><b>Plage de dates</b> : s\u00e9lectionnez une date de d\u00e9but et de fin pour voir les t\u00e2ches dans une p\u00e9riode sp\u00e9cifique.</li></ul>' }
    ]
  },
  {
    id:"habits", title:"Habitudes",
    sections:[
      { title:"Consulter les habitudes", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-habits.webp" alt="Habits" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet "Habitudes"</div><p>Chaque habitude appara\u00eet sous forme de carte affichant le nom, la puce de fr\u00e9quence, le nombre de jours cons\u00e9cutifs (s\u00e9rie) et un <b>contr\u00f4le de compl\u00e9tion</b>. Le contr\u00f4le varie selon le type de fr\u00e9quence :</p><ul><li><b>Quotidienne / Jours sp\u00e9cifiques</b> : une case circulaire. Pour les habitudes "Jours sp\u00e9cifiques", une rang\u00e9e de jours (Lun-Dim) appara\u00eet pour marquer chaque jour cible. Le contr\u00f4le est d\u00e9sactiv\u00e9 les jours non cibl\u00e9s.</li><li><b>Fois par semaine</b> : un compteur <b>X/Y</b> (ex: 2/5) montrant les compl\u00e9tions de la semaine vs l\u2019objectif hebdomadaire.</li><li><b>Fois par mois</b> : un compteur <b>X/Y</b> (ex: 8/15) montrant les compl\u00e9tions du mois vs l\u2019objectif mensuel.</li></ul><p>Appuyez sur une carte pour ouvrir un menu : <b>Marquer comme compl\u00e9t\u00e9e</b>, <b>Voir les d\u00e9tails</b>, <b>Modifier</b> ou <b>Supprimer</b>. Glissez vers la gauche pour supprimer avec annulation.</p>' },
      { title:"Cr\u00e9er une habitude", html:'<div class="guide-path">Habitudes <i class="bi bi-chevron-right"></i> Bouton <b>+</b></div><ol><li>Entrez le <b>nom de l\u2019habitude</b> (obligatoire).</li><li>Ajoutez une <b>description</b> et des <b>notes</b> optionnelles.</li><li>Choisissez la <b>fr\u00e9quence</b> :<ul><li><b>Quotidienne</b> : tous les jours.</li><li><b>Jours sp\u00e9cifiques</b> : s\u00e9lectionnez les jours de la semaine (ex. : lun, mer, ven). Une rang\u00e9e jour par jour (L-D) appara\u00eet sur la carte pour compl\u00e9ter chaque jour individuellement.</li><li><b>Fois par semaine</b> : d\u00e9finissez un objectif hebdomadaire (1-7 fois). La carte affiche un compteur <b>X/Y</b> pour suivre combien de compl\u00e9tions restent cette semaine.</li><li><b>Fois par mois</b> : d\u00e9finissez un objectif mensuel (1-30 fois). La carte affiche un compteur <b>X/Y</b> pour le mois en cours.</li></ul></li><li>Optionnellement, <b>liez \u00e0 un objectif</b>. Lorsque vous compl\u00e9tez l\u2019habitude, la progression de l\u2019objectif li\u00e9 augmente automatiquement de la valeur de contribution d\u00e9finie.</li><li>D\u00e9finissez une <b>valeur de contribution</b> (combien chaque compl\u00e9tion ajoute \u00e0 l\u2019objectif li\u00e9).</li><li>Activez le <b>Rappel</b> et d\u00e9finissez une heure pour la notification.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol>' },
      { title:"D\u00e9tails de l\u2019habitude", html:'<div class="guide-path">Habitudes <i class="bi bi-chevron-right"></i> Appuyez sur une habitude <i class="bi bi-chevron-right"></i> Voir les d\u00e9tails</div><p>L\u2019\u00e9cran de d\u00e9tails offre une vue compl\u00e8te de vos performances :</p><ul><li><b>Cartes de s\u00e9rie</b> : trois cartes affichant votre s\u00e9rie actuelle, votre plus longue s\u00e9rie et le nombre total de jours compl\u00e9t\u00e9s.</li><li><b>Cette semaine</b> : vue jour par jour de la semaine en cours.</li><li><b>Calendrier</b> : vue mensuelle compl\u00e8te avec les jours compl\u00e9t\u00e9s mis en \u00e9vidence.</li><li><b>Objectif li\u00e9</b> : si l\u2019habitude est li\u00e9e \u00e0 un objectif, son nom et sa progression s\u2019affichent.</li><li><b>Notes</b> : les notes attach\u00e9es \u00e0 l\u2019habitude.</li></ul>' },
      { title:"Statistiques et \u00e9cran de s\u00e9rie", html:'<p>Depuis l\u2019\u00e9cran de d\u00e9tails, appuyez sur <b>Voir les statistiques</b> pour acc\u00e9der aux analyses approfondies :</p><ul><li><b>Taux d\u2019adh\u00e9rence global</b> : votre r\u00e9gularit\u00e9 sur toute la dur\u00e9e.</li><li><b>Taux d\u2019adh\u00e9rence mensuel</b> : votre r\u00e9gularit\u00e9 pour le mois en cours.</li><li><b>Heatmap</b> : une grille visuelle montrant votre r\u00e9gularit\u00e9 sur plusieurs mois.</li><li><b>Historique des compl\u00e9tions</b> : une liste chronologique de chaque compl\u00e9tion enregistr\u00e9e.</li><li><b>Taux sur 7 jours</b> : votre pourcentage sur la derni\u00e8re semaine.</li><li><b>Taux sur 30 jours</b> : votre pourcentage sur le dernier mois.</li></ul><p>L\u2019<b>\u00e9cran de s\u00e9rie</b> affiche un badge avec votre s\u00e9rie actuelle, votre plus longue s\u00e9rie, le total de jours compl\u00e9t\u00e9s, les taux de compl\u00e9tion, et soit un heatmap soit un historique hebdomadaire selon la fr\u00e9quence de l\u2019habitude.</p>' }
    ]
  },
  {
    id:"goals", title:"Objectifs",
    sections:[
      { title:"Cr\u00e9er un objectif", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-goals.webp" alt="Goals" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet Plus (menu radial) <i class="bi bi-chevron-right"></i> Objectifs <i class="bi bi-chevron-right"></i> Bouton <b>+</b></div><ol><li>Entrez un <b>titre</b> et une <b>description</b>.</li><li>Choisissez un <b>type</b> :<ul><li><b>\u00c9pargne</b> : suivez vos \u00e9conomies vers un montant cible.</li><li><b>Fitness</b> : suivez vos activit\u00e9s physiques ou jalons sportifs.</li><li><b>Apprentissage</b> : suivez vos progr\u00e8s \u00e9ducatifs.</li><li><b>Personnel</b> : objectifs de d\u00e9veloppement personnel g\u00e9n\u00e9raux.</li><li><b>Checklist</b> : un objectif avec des \u00e9l\u00e9ments de jalons \u00e0 cocher.</li><li><b>Autre</b> : pour les objectifs ne correspondant pas aux cat\u00e9gories ci-dessus.</li></ul></li><li>Pour les objectifs num\u00e9riques (\u00c9pargne, Fitness, Apprentissage, Personnel, Autre), d\u00e9finissez la <b>valeur cible</b> et la <b>valeur actuelle</b>.</li><li>Pour les objectifs <b>Checklist</b>, ajoutez des <b>\u00e9l\u00e9ments de checklist</b> individuels comme jalons.</li><li>D\u00e9finissez une <b>date limite</b>.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol>' },
      { title:"Suivre la progression", html:'<p>Chaque carte d\u2019objectif affiche une barre de progression ou un indicateur de checklist. Appuyez sur un objectif pour acc\u00e9der aux options de gestion :</p><ul><li><b>Ajuster la progression</b> : incr\u00e9menter manuellement la valeur actuelle.</li><li><b>D\u00e9finir une valeur exacte</b> : saisir un nombre pr\u00e9cis pour la progression.</li><li><b>Cocher les jalons</b> : pour les objectifs checklist, marquer les \u00e9l\u00e9ments comme faits.</li><li><b>Marquer comme termin\u00e9</b> : cl\u00f4turer l\u2019objectif lorsqu\u2019il est atteint.</li><li><b>Modifier</b> : changer les d\u00e9tails de l\u2019objectif.</li><li><b>Supprimer</b> : retirer d\u00e9finitivement l\u2019objectif.</li></ul><div class="guide-tip"><i class="bi bi-info-circle"></i> Liez des habitudes \u00e0 vos objectifs pour une progression automatique. Chaque compl\u00e9tion d\u2019habitude li\u00e9e augmente la valeur actuelle de l\u2019objectif selon le montant de contribution d\u00e9fini.</div>' }
    ]
  },
  {
    id:"expenses", title:"D\u00e9penses",
    sections:[
      { title:"Consulter les d\u00e9penses", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-expenses.webp" alt="Expenses" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet "D\u00e9penses"</div><p>L\u2019\u00e9cran des d\u00e9penses propose <b>4 modes d\u2019affichage</b> pour analyser vos d\u00e9penses :</p><ul><li><b>Quotidien</b> : d\u00e9penses d\u2019une seule journ\u00e9e.</li><li><b>Hebdomadaire</b> : d\u00e9penses de la semaine en cours.</li><li><b>Mensuel</b> : d\u00e9penses du mois en cours.</li><li><b>Total</b> : toutes les d\u00e9penses de tous les temps.</li></ul><p>Utilisez les <b>fl\u00e8ches gauche et droite</b> pour naviguer entre les dates. L\u2019\u00e9cran affiche :</p><ul><li><b>Carte du total</b> : montant total des d\u00e9penses pour la p\u00e9riode s\u00e9lectionn\u00e9e.</li><li><b>Graphique en camembert</b> : r\u00e9partition visuelle par cat\u00e9gorie.</li><li><b>Liste des d\u00e9penses</b> : entr\u00e9es individuelles avec descriptions, montants et cat\u00e9gories.</li></ul><p>Glissez une carte de d\u00e9pense vers la gauche pour la supprimer.</p>' },
      { title:"Ajouter une d\u00e9pense", html:'<div class="guide-path">D\u00e9penses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> Ajouter</div><ol><li>Entrez une <b>description</b> de la d\u00e9pense.</li><li>Entrez le <b>montant</b>.</li><li>S\u00e9lectionnez une <b>cat\u00e9gorie</b> : Alimentation, Transport, Logement, Sant\u00e9, \u00c9ducation, Divertissement, etc.</li><li>D\u00e9finissez la <b>date</b>.</li><li>Optionnellement, marquez comme <b>r\u00e9currente</b> :<ul><li><b>Quotidienne</b> : se r\u00e9p\u00e8te chaque jour.</li><li><b>Hebdomadaire</b> : se r\u00e9p\u00e8te chaque semaine.</li><li><b>Mensuelle</b> : se r\u00e9p\u00e8te chaque mois.</li><li><b>Jours personnalis\u00e9s</b> : choisissez des jours sp\u00e9cifiques de la semaine.</li></ul></li><li>Un <b>indicateur de budget</b> montre le budget restant pour la cat\u00e9gorie s\u00e9lectionn\u00e9e, si un budget est d\u00e9fini.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol>' },
      { title:"Actions du FAB", html:'<p>Le bouton d\u2019action flottant (FAB) sur l\u2019\u00e9cran des d\u00e9penses se d\u00e9ploie pour r\u00e9v\u00e9ler 4 actions :</p><ul><li><b>R\u00e9currentes</b> : g\u00e9rer les mod\u00e8les de d\u00e9penses r\u00e9currentes.</li><li><b>Budget</b> : ouvrir la gestion des budgets.</li><li><b>R\u00e9sum\u00e9</b> : voir un r\u00e9sum\u00e9 d\u00e9taill\u00e9 des d\u00e9penses.</li><li><b>Ajouter</b> : cr\u00e9er une nouvelle entr\u00e9e de d\u00e9pense.</li></ul>' },
      { title:"R\u00e9sum\u00e9 des d\u00e9penses", html:'<div class="guide-path">D\u00e9penses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> R\u00e9sum\u00e9</div><p>L\u2019\u00e9cran de r\u00e9sum\u00e9 fournit une analyse d\u00e9taill\u00e9e :</p><ul><li><b>S\u00e9lecteur de date</b> : choisissez un mois \u00e0 analyser.</li><li><b>Montant total</b> : d\u00e9penses globales pour la p\u00e9riode.</li><li><b>D\u00e9composition par cat\u00e9gorie</b> : chaque cat\u00e9gorie est list\u00e9e avec son total et une barre de progression.</li></ul><p>Appuyez sur une cat\u00e9gorie pour voir son <b>R\u00e9sum\u00e9 de cat\u00e9gorie</b>, montrant chaque d\u00e9pense individuelle.</p>' },
      { title:"Gestion des budgets", html:'<div class="guide-path">D\u00e9penses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> Budget</div><p>Les budgets vous aident \u00e0 contr\u00f4ler vos d\u00e9penses en d\u00e9finissant des limites par cat\u00e9gorie :</p><ol><li>Appuyez sur <b>+</b> pour ajouter un nouveau budget.</li><li>S\u00e9lectionnez une <b>cat\u00e9gorie</b>.</li><li>D\u00e9finissez le <b>montant limite mensuel</b>.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol><p>Chaque budget affiche une barre de progression visuelle. Lorsque vos d\u00e9penses approchent ou d\u00e9passent la limite, l\u2019application affiche une alerte. L\u2019indicateur de budget appara\u00eet aussi lors de l\u2019ajout de nouvelles d\u00e9penses.</p>' },
      { title:"D\u00e9penses r\u00e9currentes", html:'<div class="guide-path">D\u00e9penses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> R\u00e9currentes</div><p>Consultez tous les mod\u00e8les de d\u00e9penses r\u00e9currentes actifs. Pour chaque mod\u00e8le, vous pouvez :</p><ul><li><b>Modifier</b> : changer la description, le montant, la cat\u00e9gorie ou la fr\u00e9quence.</li><li><b>Arr\u00eater</b> : d\u00e9sactiver le mod\u00e8le pour ne plus cr\u00e9er de futures entr\u00e9es.</li><li><b>Supprimer</b> : retirer le mod\u00e8le uniquement, ou supprimer le mod\u00e8le ainsi que toutes ses instances g\u00e9n\u00e9r\u00e9es.</li></ul>' }
    ]
  },
  {
    id:"debts", title:"Dettes",
    sections:[
      { title:"Consulter les dettes", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-debts.webp" alt="Debts" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet "Dettes"</div><p>L\u2019\u00e9cran des dettes s\u2019ouvre avec un banni\u00e8re r\u00e9sum\u00e9 affichant deux totaux :</p><ul><li><b>Vous devez</b> : le montant combin\u00e9 de toutes vos dettes envers les autres.</li><li><b>On vous doit</b> : le montant combin\u00e9 que les autres vous doivent.</li></ul><p>Filtrez la liste avec les onglets en haut : <b>Toutes</b>, <b>Impay\u00e9es</b> ou <b>Pay\u00e9es</b>. Glissez une carte vers la gauche pour la supprimer.</p>' },
      { title:"Ajouter une dette", html:'<div class="guide-path">Dettes <i class="bi bi-chevron-right"></i> Bouton <b>+</b></div><ol><li>Entrez le <b>nom de la personne</b>.</li><li>Entrez le <b>montant</b>.</li><li>Ajoutez une <b>description</b> de la dette.</li><li>Choisissez le <b>type</b> :<ul><li><b>Je dois</b> : vous devez de l\u2019argent \u00e0 cette personne.</li><li><b>On me doit</b> : cette personne vous doit de l\u2019argent.</li></ul></li><li>Optionnellement, d\u00e9finissez une <b>date d\u2019\u00e9ch\u00e9ance</b>.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol>' },
      { title:"Effectuer des paiements", html:'<p>Depuis une carte de dette, vous avez plusieurs actions disponibles :</p><ul><li><b>Paiement partiel</b> : entrez un montant pour r\u00e9duire le solde restant. La carte se met \u00e0 jour avec le nouveau solde.</li><li><b>Marquer comme pay\u00e9e</b> : cl\u00f4ture la dette enti\u00e8rement.</li><li><b>Modifier</b> : changer les d\u00e9tails de la dette.</li><li><b>Supprimer</b> : retirer l\u2019enregistrement de la dette.</li></ul>' }
    ]
  },
  {
    id:"journal", title:"Journal (SoulSync)",
    sections:[
      { title:"\u00c9crire des entr\u00e9es de journal", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-journal.webp" alt="Journal" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet Plus (menu radial) <i class="bi bi-chevron-right"></i> SoulSync <i class="bi bi-chevron-right"></i> Bouton <b>+</b></div><ol><li>Optionnellement, choisissez un <b>sujet d\u2019\u00e9criture</b> pour vous inspirer. Les sujets sont de deux types :<ul><li><b>Sujets statiques</b> : des suggestions pr\u00e9-\u00e9crites qui changent quotidiennement.</li><li><b>Sujets g\u00e9n\u00e9r\u00e9s par l\u2019IA</b> : des suggestions personnalis\u00e9es cr\u00e9\u00e9es par l\u2019IA (n\u00e9cessite la licence IA).</li></ul></li><li>\u00c9crivez votre <b>entr\u00e9e de journal</b> dans la zone de texte.</li><li>S\u00e9lectionnez votre <b>humeur</b> actuelle dans le s\u00e9lecteur d\u2019humeurs. Les 20 humeurs disponibles sont : Heureux, Triste, Neutre, Excit\u00e9, Calme, Anxieux, Reconnaissant, En col\u00e8re, Aim\u00e9, Paisible, Stress\u00e9, \u00c9nergique, Fatigu\u00e9, Plein d\u2019espoir, Seul, Confus, Fier, D\u00e9\u00e7u, Content et Inspir\u00e9. Chaque humeur a sa propre ic\u00f4ne et couleur.</li><li>Ajoutez des <b>tags</b> pour cat\u00e9goriser votre entr\u00e9e (ex. : "gratitude", "travail", "famille").</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol>' },
      { title:"Parcourir les entr\u00e9es", html:'<p>Les entr\u00e9es de journal apparaissent sous forme de cartes affichant la date, l\u2019ic\u00f4ne d\u2019humeur, un aper\u00e7u du contenu et les tags. Appuyez sur une entr\u00e9e pour la lire en entier ou la modifier. Glissez vers la gauche pour la supprimer.</p><p>Utilisez le bouton FAB (<b>+</b>) pour cr\u00e9er une nouvelle entr\u00e9e \u00e0 tout moment.</p>' }
    ]
  },
  {
    id:"notes", title:"Notes",
    sections:[
      { title:"Cr\u00e9er et modifier des notes", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-notes.webp" alt="Notes" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet Plus (menu radial) <i class="bi bi-chevron-right"></i> Notes <i class="bi bi-chevron-right"></i> Bouton <b>+</b></div><ol><li>Entrez un <b>titre</b> pour la note.</li><li>\u00c9crivez le <b>contenu</b> dans le champ principal.</li><li>Ajoutez un ou plusieurs <b>tags</b> pour organiser vos notes. Vous pouvez ajouter de nouveaux tags ou en supprimer.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol><p>Appuyez sur n\u2019importe quelle carte de note pour l\u2019ouvrir et la modifier. Chaque carte affiche le titre et un aper\u00e7u du contenu. Glissez une note vers la gauche pour la supprimer.</p>' },
      { title:"Recherche et filtrage", html:'<p>En haut de l\u2019\u00e9cran des notes :</p><ul><li><b>Barre de recherche</b> : tapez des mots-cl\u00e9s pour chercher dans les titres et contenus des notes.</li><li><b>Puces de tags</b> : appuyez sur une puce de tag pour afficher uniquement les notes avec ce tag.</li><li><b>Renommer les tags</b> : appui long sur une puce de tag pour la renommer. Le nouveau nom s\u2019applique \u00e0 toutes les notes utilisant ce tag.</li></ul>' }
    ]
  },
  {
    id:"water", title:"Suivi d\u2019eau",
    sections:[
      { title:"Suivre votre hydratation", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-water.webp" alt="Water Intake" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Onglet Plus (menu radial) <i class="bi bi-chevron-right"></i> Eau</div><p>L\u2019\u00e9cran de suivi d\u2019eau pr\u00e9sente un verre visuel qui se remplit avec un niveau d\u2019eau anim\u00e9 au fur et \u00e0 mesure de vos enregistrements. Votre progression vers l\u2019objectif quotidien est affich\u00e9e en pourcentage.</p><p>Trois <b>boutons d\u2019ajout rapide</b> vous permettent d\u2019enregistrer instantan\u00e9ment :</p><ul><li><b>250 ml</b></li><li><b>500 ml</b></li><li><b>750 ml</b></li></ul><p>Appuyez sur <b>R\u00e9initialiser</b> en bas pour effacer la consommation du jour et recommencer. Le maximum quotidien est plafonn\u00e9 \u00e0 5 litres.</p><p>Lorsque vous atteignez votre objectif quotidien, une <b>animation de confettis</b> c\u00e9l\u00e8bre votre r\u00e9ussite avec un retour haptique.</p>' },
      { title:"Param\u00e8tres et historique", html:'<p>Appuyez sur l\u2019<b>ic\u00f4ne engrenage</b> pour configurer votre <b>objectif quotidien d\u2019eau</b> en millilitres.</p><p>La section <b>Historique</b> affiche un <b>graphique en courbe hebdomadaire</b> de votre consommation quotidienne avec une <b>ligne d\u2019objectif</b>, pour suivre votre r\u00e9gularit\u00e9 d\u2019hydratation au fil du temps. Appuyez sur l\u2019<b>ic\u00f4ne historique</b> dans la barre du haut pour un journal d\u00e9taill\u00e9 de toutes vos entr\u00e9es.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Activez les rappels d\u2019eau dans Param\u00e8tres \u2192 Notifications pour recevoir des rappels p\u00e9riodiques de boire de l\u2019eau tout au long de la journ\u00e9e.</div>' }
    ]
  },
  {
    id:"ai", title:"Hub IA",
    sections:[
      { title:"Aper\u00e7u", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-ai-hub.webp" alt="AI Hub" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Ic\u00f4ne Hub IA (barre sup\u00e9rieure)</div><p>Le Hub IA est votre portail vers toutes les fonctionnalit\u00e9s aliment\u00e9es par l\u2019IA dans Velora. Il n\u00e9cessite l\u2019<b>abonnement IA</b> et une connexion internet. Les utilisateurs Standard voient un aper\u00e7u de chaque fonctionnalit\u00e9 avec une invitation \u00e0 mettre \u00e0 niveau.</p><p>Fonctionnalit\u00e9s IA disponibles :</p><ul><li><b>Assistant vocal</b> : discutez avec un assistant IA par texte ou voix.</li><li><b>Coach de vie</b> : recevez des conseils personnalis\u00e9s de d\u00e9veloppement personnel.</li><li><b>Missions al\u00e9atoires</b> : des d\u00e9fis de productivit\u00e9 g\u00e9n\u00e9r\u00e9s par l\u2019IA.</li><li><b>Muse cr\u00e9ative</b> : trouvez de l\u2019inspiration cr\u00e9ative, des sujets d\u2019\u00e9criture et des id\u00e9es.</li><li><b>D\u00e9fis dynamiques</b> : des d\u00e9fis personnalis\u00e9s adapt\u00e9s \u00e0 vos donn\u00e9es et habitudes.</li><li><b>Capsules temporelles</b> : cr\u00e9ez des messages verrouill\u00e9s dans le temps pour votre futur vous.</li></ul><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> Les fonctionnalit\u00e9s IA n\u00e9cessitent une connexion internet active et l\u2019abonnement IA. Les utilisateurs Standard voient un aper\u00e7u avec une invitation de mise \u00e0 niveau.</div>' },
      { title:"Chat IA", html:'<div class="guide-path">Hub IA <i class="bi bi-chevron-right"></i> Assistant vocal</div><p>L\u2019\u00e9cran de chat IA offre une interface conversationnelle compl\u00e8te avec des options de saisie riches :</p><h4>Conversations</h4><p>Ouvrez le <b>tiroir de conversations</b> pour g\u00e9rer vos discussions. Vous pouvez <b>cr\u00e9er</b> de nouvelles conversations, <b>basculer</b> entre celles existantes, ou <b>supprimer</b> d\u2019anciennes conversations.</p><h4>Bascule de contexte</h4><p>Alternez entre deux modes en haut du chat :</p><ul><li><b>Contexte personnel</b> : l\u2019IA utilise vos donn\u00e9es (t\u00e2ches, habitudes, objectifs, d\u00e9penses, journal) pour fournir des conseils et analyses personnalis\u00e9s.</li><li><b>Contexte g\u00e9n\u00e9ral</b> : l\u2019IA r\u00e9pond avec des connaissances g\u00e9n\u00e9rales, sans r\u00e9f\u00e9rencer vos donn\u00e9es personnelles.</li></ul><h4>Synth\u00e8se vocale (TTS)</h4><p>Activez le TTS pour que l\u2019IA lise ses r\u00e9ponses \u00e0 haute voix. Utile pour une utilisation mains libres.</p><h4>Saisie vocale</h4><p>La saisie vocale offre une fa\u00e7on naturelle d\u2019interagir avec l\u2019IA :</p><ul><li><b>Appui long sur le microphone</b> pour commencer l\u2019enregistrement vocal.</li><li><b>Glissez vers le haut</b> pour verrouiller l\u2019enregistrement en mode mains libres.</li><li><b>Glissez vers la gauche</b> pour annuler l\u2019enregistrement sans envoyer.</li><li>Rel\u00e2chez le bouton pour envoyer le message vocal.</li></ul><h4>Saisie texte</h4><p>Tapez votre message dans le champ en bas et appuyez sur envoyer. L\u2019IA r\u00e9pond dans la vue de conversation au-dessus.</p>' },
      { title:"Capsules temporelles", html:'<div class="guide-path">Hub IA <i class="bi bi-chevron-right"></i> Capsules temporelles</div><p>Les capsules temporelles vous permettent d\u2019\u00e9crire des messages verrouill\u00e9s dans le temps pour votre futur vous ou pour quelqu\u2019un d\u2019autre. La capsule reste scell\u00e9e jusqu\u2019\u00e0 la date d\u2019ouverture.</p><ol><li>Appuyez sur <b>+</b> pour cr\u00e9er une nouvelle capsule.</li><li>\u00c9crivez le <b>contenu de votre message</b>. Vous pouvez aussi utiliser l\u2019option <b>G\u00e9n\u00e9ration automatique par l\u2019IA</b> pour que l\u2019IA \u00e9crive ou sugg\u00e8re un message.</li><li>D\u00e9finissez la <b>date d\u2019ouverture</b>. La date minimum est demain; vous ne pouvez pas choisir aujourd\u2019hui.</li><li>Optionnellement, ajoutez un <b>nom de destinataire</b> et un <b>email</b> pour d\u00e9dier ou envoyer la capsule \u00e0 quelqu\u2019un.</li><li>Appuyez sur <b>Enregistrer</b>.</li></ol><p>Une fois enregistr\u00e9e, la capsule est scell\u00e9e et ne peut pas \u00eatre ouverte avant la date d\u00e9finie. Vous pouvez \u00e9galement <b>partager un lien</b> vers la capsule avec d\u2019autres personnes.</p>' }
    ]
  },
  {
    id:"calendar", title:"Calendrier",
    sections:[
      { title:"Vue calendrier", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-calendar.webp" alt="Calendar" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Menu (\u22ee) <i class="bi bi-chevron-right"></i> Calendrier</div><p>L\u2019\u00e9cran Calendrier affiche les \u00e9v\u00e9nements de plusieurs types de donn\u00e9es sur leurs dates respectives :</p><ul><li><b>T\u00e2ches</b> : affich\u00e9es \u00e0 leurs dates d\u2019\u00e9ch\u00e9ance.</li><li><b>Dettes</b> : affich\u00e9es \u00e0 leurs dates d\u2019\u00e9ch\u00e9ance.</li><li><b>Objectifs</b> : affich\u00e9s \u00e0 leurs dates limites.</li><li><b>Habitudes</b> : affich\u00e9es \u00e0 leurs jours programm\u00e9s.</li><li><b>D\u00e9penses</b> : affich\u00e9es aux dates o\u00f9 elles ont \u00e9t\u00e9 enregistr\u00e9es.</li></ul><h4>Modes d\u2019affichage</h4><p>Alternez entre trois vues :</p><ul><li><b>Mois</b> : vue du mois complet d\u2019un coup d\u2019\u0153il.</li><li><b>Deux semaines</b> : vue glissante sur 14 jours.</li><li><b>Semaine</b> : vue d\u00e9taill\u00e9e sur 7 jours.</li></ul><p>Appuyez sur le bouton <b>Aujourd\u2019hui</b> pour revenir \u00e0 la date actuelle.</p><h4>Interagir avec les \u00e9v\u00e9nements</h4><p>Appuyez sur une <b>date</b> pour voir tous les \u00e9v\u00e9nements de ce jour list\u00e9s en dessous du calendrier. Appuyez sur un <b>\u00e9v\u00e9nement de t\u00e2che</b> pour le modifier. Utilisez le bouton <b>FAB (+)</b> pour ajouter une nouvelle t\u00e2che \u00e0 la date s\u00e9lectionn\u00e9e.</p>' }
    ]
  },
  {
    id:"pomodoro", title:"Minuteur Pomodoro",
    sections:[
      { title:"Sessions de focus", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-pomodoro.webp" alt="Pomodoro Timer" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Menu (\u22ee) <i class="bi bi-chevron-right"></i> Pomodoro</div><p>Le minuteur Pomodoro vous aide \u00e0 vous concentrer gr\u00e2ce \u00e0 des cycles structur\u00e9s de travail et de pause. Voici comment fonctionne une session typique :</p><ol><li>Optionnellement, <b>liez une t\u00e2che</b> \u00e0 la session pour que votre temps de concentration soit suivi par rapport \u00e0 une t\u00e2che sp\u00e9cifique.</li><li>Appuyez sur <b>D\u00e9marrer</b> pour commencer la p\u00e9riode de travail.</li><li>Lorsque le minuteur se termine, l\u2019application vous invite \u00e0 faire une pause.</li><li>Apr\u00e8s la pause, la session de travail suivante commence automatiquement.</li><li>Apr\u00e8s un certain nombre de sessions, vous obtenez une pause plus longue.</li></ol>' },
      { title:"Contr\u00f4les du minuteur", html:'<p>Pendant une session, vous disposez des contr\u00f4les suivants :</p><ul><li><b>D\u00e9marrer / Pause</b> : lancer ou mettre en pause le minuteur actuel.</li><li><b>R\u00e9initialiser</b> : remettre le minuteur \u00e0 z\u00e9ro sans terminer la session.</li><li><b>Passer la pause</b> : pendant une pause, passez-la pour d\u00e9marrer directement la prochaine session de travail.</li></ul><p>Le panneau <b>Stats du jour</b> (toujours visible) affiche le nombre de sessions termin\u00e9es, le temps total de concentration pour la journ\u00e9e et votre s\u00e9rie quotidienne actuelle.</p><p>Le minuteur inclut une <b>sonnerie et vibration</b> \u00e0 la fin de chaque session, et peut <b>d\u00e9marrer automatiquement la session suivante</b> pour un flux ininterrompu.</p>' },
      { title:"Param\u00e8tres du Pomodoro", html:'<p>Appuyez sur l\u2019ic\u00f4ne engrenage pour configurer le minuteur selon vos pr\u00e9f\u00e9rences :</p><ul><li><b>Dur\u00e9e de travail</b> : dur\u00e9e de chaque session de focus (par d\u00e9faut : 25 minutes, plage : 5 \u00e0 60 minutes).</li><li><b>Dur\u00e9e de pause courte</b> : temps de repos entre les sessions (par d\u00e9faut : 5 minutes, plage : 1 \u00e0 15 minutes).</li><li><b>Dur\u00e9e de pause longue</b> : repos plus long apr\u00e8s un nombre d\u00e9fini de sessions (par d\u00e9faut : 15 minutes, plage : 5 \u00e0 30 minutes).</li><li><b>Sessions avant pause longue</b> : combien de sessions avant la pause longue (par d\u00e9faut : 4).</li><li><b>Son ambiant</b> : activez un son de fond pendant le focus. Choisissez parmi : <b>Pluie</b>, <b>For\u00eat</b>, <b>Oc\u00e9an</b>, <b>Caf\u00e9</b>, <b>Chemin\u00e9e</b> ou <b>Bruit blanc</b>. R\u00e9glez le volume avec le curseur.</li></ul>' },
      { title:"Historique des sessions", html:'<p>Acc\u00e9dez \u00e0 la vue <b>Historique</b> pour consulter toutes vos sessions Pomodoro pass\u00e9es, y compris les dates, dur\u00e9es, t\u00e2ches li\u00e9es et le nombre de cycles compl\u00e9t\u00e9s.</p>' }
    ]
  },
  {
    id:"analytics", title:"Analytiques et statistiques",
    sections:[
      { title:"Analytiques avanc\u00e9es", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-analytics.webp" alt="Analytics" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Ic\u00f4ne Analytiques (barre sup\u00e9rieure)</div><p>Les analytiques avanc\u00e9es fournissent des graphiques visuels et des donn\u00e9es de tendance au fil du temps. S\u00e9lectionnez une p\u00e9riode en haut : <b>Semaine</b>, <b>Mois</b> ou <b>Trimestre</b>.</p><p>Graphiques disponibles :</p><ul><li><b>Tendance des d\u00e9penses</b> : graphique montrant vos habitudes de d\u00e9penses sur la p\u00e9riode.</li><li><b>Adh\u00e9rence aux habitudes</b> : votre taux de compl\u00e9tion des habitudes au fil du temps.</li><li><b>Tendance de compl\u00e9tion des t\u00e2ches</b> : combien de t\u00e2ches termin\u00e9es par rapport aux t\u00e2ches cr\u00e9\u00e9es.</li><li><b>Comparaison de p\u00e9riodes</b> : compare la p\u00e9riode actuelle avec la pr\u00e9c\u00e9dente, mettant en \u00e9vidence les am\u00e9liorations ou d\u00e9clins.</li></ul>' },
      { title:"\u00c9cran de statistiques", html:'<p>L\u2019\u00e9cran de statistiques se concentre sur les chiffres r\u00e9sum\u00e9s plut\u00f4t que sur les graphiques de tendance. Basculez entre <b>Semaine</b> et <b>Mois</b> en haut.</p><h4>Aper\u00e7u des t\u00e2ches</h4><ul><li>Total des t\u00e2ches pour la p\u00e9riode.</li><li>T\u00e2ches termin\u00e9es.</li><li>T\u00e2ches en attente.</li><li>Pourcentage de compl\u00e9tion.</li></ul><h4>D\u00e9penses</h4><ul><li>Montant total des d\u00e9penses pour la p\u00e9riode.</li><li>Graphique en camembert par cat\u00e9gorie (vue mensuelle).</li><li>L\u00e9gende des cat\u00e9gories avec montants individuels.</li></ul><h4>Habitudes</h4><ul><li>Total des habitudes suivies.</li><li>Total des compl\u00e9tions pour la p\u00e9riode.</li><li>Moyenne de compl\u00e9tions par jour.</li></ul><div class="guide-tip"><i class="bi bi-info-circle"></i> Les analytiques montrent les <b>tendances au fil du temps</b> (comment les choses \u00e9voluent), tandis que les statistiques montrent les <b>totaux r\u00e9sum\u00e9s</b> (o\u00f9 en sont les choses maintenant). Utilisez les deux pour un portrait complet de votre productivit\u00e9.</div>' }
    ]
  },
  {
    id:"search", title:"Recherche globale",
    sections:[
      { title:"Rechercher partout", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-search.webp" alt="Global Search" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Ic\u00f4ne Recherche (barre sup\u00e9rieure)</div><p>La recherche globale vous permet de trouver n\u2019importe quoi dans toutes vos donn\u00e9es Velora. Tapez un mot-cl\u00e9 et les r\u00e9sultats apparaissent instantan\u00e9ment, regroup\u00e9s par type :</p><ul><li><b>T\u00e2ches</b></li><li><b>D\u00e9penses</b></li><li><b>Notes</b></li><li><b>Habitudes</b></li><li><b>Dettes</b></li><li><b>Objectifs</b></li><li><b>Contacts</b></li></ul><p>Appuyez sur n\u2019importe quel r\u00e9sultat pour naviguer directement vers cet \u00e9l\u00e9ment.</p>' }
    ]
  },
  {
    id:"contacts", title:"Contacts",
    sections:[
      { title:"G\u00e9rer les contacts", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-contacts.webp" alt="Contacts" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Menu (\u22ee) <i class="bi bi-chevron-right"></i> Contacts</div><p>Velora inclut un carnet de contacts int\u00e9gr\u00e9. Vous pouvez stocker les contacts utilis\u00e9s dans d\u2019autres fonctionnalit\u00e9s (comme les dettes).</p><ul><li><b>Recherche</b> : utilisez la barre de recherche en haut pour trouver des contacts par nom.</li><li><b>Ajouter</b> : appuyez sur <b>+</b> pour cr\u00e9er un contact. <b>Nom</b> et <b>T\u00e9l\u00e9phone</b> sont obligatoires. <b>Email</b> est optionnel.</li><li><b>Modifier</b> : appuyez sur une carte de contact pour modifier ses d\u00e9tails.</li><li><b>Supprimer</b> : retirez un contact. Les contacts supprim\u00e9s vont dans la Corbeille, o\u00f9 vous pouvez les restaurer.</li></ul>' }
    ]
  },
  {
    id:"notifications", title:"Notifications et rappels",
    sections:[
      { title:"Param\u00e8tres de notification", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-notifications.webp" alt="Notifications" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Menu (\u22ee) <i class="bi bi-chevron-right"></i> Param\u00e8tres <i class="bi bi-chevron-right"></i> Notifications et rapports</div><p>Configurez chaque type de notification individuellement :</p><ul><li><b>R\u00e9sum\u00e9 du matin</b> : activez et d\u00e9finissez une heure pour recevoir un aper\u00e7u quotidien.</li><li><b>Inspiration quotidienne</b> : activez et d\u00e9finissez une heure pour une citation motivante.</li><li><b>Rappels de t\u00e2ches</b> : activez pour recevoir des alertes aux heures d\u2019\u00e9ch\u00e9ance.</li><li><b>Rappels d\u2019habitudes</b> : activez pour recevoir des rappels de compl\u00e9ter vos habitudes.</li><li><b>Rappels de dettes</b> : activez pour recevoir des alertes aux dates d\u2019\u00e9ch\u00e9ance.</li><li><b>Rappels d\u2019objectifs</b> : activez pour des rappels de progression.</li><li><b>Rappels d\u2019eau</b> : activez pour recevoir des rappels p\u00e9riodiques d\u2019hydratation.</li></ul><p>Options suppl\u00e9mentaires :</p><ul><li><b>Param\u00e8tres d\u2019alarme</b> : configurez le comportement des alarmes.</li><li><b>Tout effacer</b> : r\u00e9initialisez tous les bascules et horaires de notification.</li><li><b>Ouvrir les param\u00e8tres syst\u00e8me</b> : acc\u00e9dez aux param\u00e8tres de notification de votre appareil pour un contr\u00f4le fin.</li></ul>' },
      { title:"Rapports par email", html:'<p>Dans l\u2019\u00e9cran Notifications et rapports, vous pouvez configurer les <b>Rapports par email</b> :</p><ol><li>V\u00e9rifiez votre <b>statut d\u2019email</b> (si une adresse est li\u00e9e).</li><li>Activez le <b>bascule principal</b> pour activer les rapports par email.</li><li>D\u00e9finissez l\u2019<b>heure de livraison</b> des rapports.</li><li>Choisissez le <b>contenu</b> \u00e0 inclure :<ul><li>R\u00e9sum\u00e9 des t\u00e2ches</li><li>R\u00e9sum\u00e9 des habitudes</li><li>R\u00e9sum\u00e9 des objectifs</li><li>R\u00e9sum\u00e9 des d\u00e9penses</li><li>R\u00e9sum\u00e9 des dettes</li></ul></li></ol><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> Les rapports par email n\u00e9cessitent la <b>licence IA</b> pour fonctionner. Les utilisateurs Standard ne peuvent pas activer cette fonctionnalit\u00e9.</div>' },
      { title:"\u00c9cran d\u2019alarme", html:'<p>Lorsqu\u2019un rappel de t\u00e2che ou d\u2019habitude se d\u00e9clenche, une <b>alarme plein \u00e9cran</b> prend le contr\u00f4le de l\u2019affichage avec :</p><ul><li>Une <b>ic\u00f4ne pulsante</b> anim\u00e9e pour attirer votre attention.</li><li>Le <b>nom de la t\u00e2che ou de l\u2019habitude</b> et sa description.</li><li>L\u2019<b>heure actuelle</b>.</li></ul><p>Vous avez deux options :</p><ul><li><b>Reporter</b> : repoussez l\u2019alarme. Choisissez parmi 5, 15, 30 ou 60 minutes.</li><li><b>Fermer</b> : d\u00e9sactivez l\u2019alarme et revenez \u00e0 l\u2019application.</li></ul>' }
    ]
  },
  {
    id:"backup", title:"Sauvegarde et restauration",
    sections:[
      { title:"Sauvegarde cloud (Google Drive)", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-backup.webp" alt="Backup & Restore" /></div><div class="guide-path">Param\u00e8tres <i class="bi bi-chevron-right"></i> Sauvegarde et restauration <i class="bi bi-chevron-right"></i> Cloud</div><ol><li><b>Connectez-vous</b> avec votre compte Google.</li><li>Acceptez le <b>dialogue de consentement</b>, qui inclut des liens vers les conditions d\u2019utilisation et la politique de confidentialit\u00e9.</li><li>Choisissez les <b>types de donn\u00e9es</b> \u00e0 inclure dans la sauvegarde via le s\u00e9lecteur.</li><li>Appuyez sur <b>Sauvegarder maintenant</b> pour cr\u00e9er une sauvegarde imm\u00e9diate.</li><li>D\u00e9finissez la <b>fr\u00e9quence de sauvegarde automatique</b> : Quotidienne, Hebdomadaire ou Mensuelle.</li></ol><p>Une fois connect\u00e9, votre <b>photo de profil</b> et votre <b>adresse email</b> sont affich\u00e9es sur l\u2019\u00e9cran de sauvegarde.</p><p>Pour restaurer vos donn\u00e9es sur un nouvel appareil :</p><ol><li>Connectez-vous avec le m\u00eame compte Google.</li><li>S\u00e9lectionnez une sauvegarde dans la <b>liste des sauvegardes</b>.</li><li>Appuyez sur <b>Restaurer</b>.</li></ol><p>Appuyez sur <b>Se d\u00e9connecter</b> pour dissocier votre compte Google de la sauvegarde cloud.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Vos donn\u00e9es sont stock\u00e9es dans VOTRE compte Google Drive. Velora n\u2019acc\u00e8de jamais \u00e0 vos fichiers Google Drive et ne les stocke pas sur ses serveurs.</div>' },
      { title:"Sauvegarde locale", html:'<div class="guide-path">Param\u00e8tres <i class="bi bi-chevron-right"></i> Sauvegarde et restauration <i class="bi bi-chevron-right"></i> Local</div><p>Exportez vos donn\u00e9es sous forme de fichier de sauvegarde local sur votre appareil. Pour restaurer, importez un fichier de sauvegarde pr\u00e9c\u00e9demment export\u00e9. Utile pour transf\u00e9rer des donn\u00e9es entre appareils sans compte Google.</p>' }
    ]
  },
  {
    id:"settings", title:"Param\u00e8tres et profil",
    sections:[
      { title:"Profil", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-settings.webp" alt="Settings" /></div><div class="guide-path">Accueil <i class="bi bi-chevron-right"></i> Menu (\u22ee) <i class="bi bi-chevron-right"></i> Param\u00e8tres <i class="bi bi-chevron-right"></i> Profil</div><p>G\u00e9rez vos informations personnelles :</p><ul><li><b>Pr\u00e9nom</b> et <b>Nom de famille</b>.</li><li><b>Date de naissance</b> : s\u00e9lectionn\u00e9e via un s\u00e9lecteur de date.</li><li><b>Adresse email</b>.</li><li><b>Adresse</b>.</li><li><b>Devise</b> : s\u00e9lectionnez la devise utilis\u00e9e pour les d\u00e9penses, dettes et objectifs.</li></ul><p>Le lien <b>Noms du tableau de bord</b> ouvre un \u00e9cran s\u00e9par\u00e9 o\u00f9 vous pouvez ajouter ou supprimer les noms de salutation qui apparaissent sur le tableau de bord (ex. : "Bonjour, Alex").</p>' },
      { title:"Langue", html:'<p>Basculez entre <b>Anglais</b> et <b>Fran\u00e7ais</b>. L\u2019int\u00e9gralit\u00e9 de l\u2019interface, y compris tous les libell\u00e9s, boutons, messages et notifications, change instantan\u00e9ment. Aucun red\u00e9marrage n\u2019est n\u00e9cessaire.</p>' },
      { title:"Corbeille", html:'<div class="guide-path">Param\u00e8tres <i class="bi bi-chevron-right"></i> Corbeille</div><p>Les \u00e9l\u00e9ments supprim\u00e9s sont d\u00e9plac\u00e9s dans la Corbeille au lieu d\u2019\u00eatre d\u00e9finitivement retir\u00e9s. L\u2019\u00e9cran Corbeille vous permet de filtrer par type :</p><ul><li><b>Tous</b> : affiche tous les \u00e9l\u00e9ments supprim\u00e9s.</li><li><b>T\u00e2che</b></li><li><b>D\u00e9pense</b></li><li><b>Habitude</b></li><li><b>Objectif</b></li><li><b>Dette</b></li><li><b>Note</b></li><li><b>Contact</b></li><li><b>Journal</b></li><li><b>Budget</b></li><li><b>Capsule</b></li><li><b>Conversation</b></li></ul><p>Pour chaque \u00e9l\u00e9ment dans la Corbeille :</p><ul><li><b>Restaurer</b> : remettre l\u2019\u00e9l\u00e9ment \u00e0 son emplacement d\u2019origine.</li><li><b>Supprimer d\u00e9finitivement</b> : retirer l\u2019\u00e9l\u00e9ment pour toujours sans possibilit\u00e9 de r\u00e9cup\u00e9ration.</li></ul><p>Appuyez sur <b>Vider la corbeille</b> pour supprimer d\u00e9finitivement tous les \u00e9l\u00e9ments d\u2019un coup.</p>' },
      { title:"\u00c0 propos et mentions l\u00e9gales", html:'<h4>\u00c0 propos</h4><ul><li><b>Version de l\u2019application</b> : le num\u00e9ro de version actuellement install\u00e9.</li><li><b>V\u00e9rifier les mises \u00e0 jour</b> : voir si une nouvelle version est disponible.</li><li><b>Contacter le support</b> : contactez-nous via <b>WhatsApp</b> ou <b>Email</b>.</li></ul><h4>Mentions l\u00e9gales</h4><ul><li><b>Politique de confidentialit\u00e9</b> : lire la politique compl\u00e8te.</li><li><b>Conditions d\u2019utilisation</b> : lire les conditions g\u00e9n\u00e9rales.</li><li><b>Guide d\u2019utilisation</b> : ouvrir ce guide depuis l\u2019application.</li></ul>' }
    ]
  },
  {
    id:"security", title:"S\u00e9curit\u00e9 et \u00e9cran de verrouillage",
    sections:[
      { title:"Param\u00e8tres de s\u00e9curit\u00e9", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-lockscreen.webp" alt="Lock Screen" /></div><div class="guide-path">Param\u00e8tres <i class="bi bi-chevron-right"></i> S\u00e9curit\u00e9</div><p>Prot\u00e9gez vos donn\u00e9es avec un \u00e9cran de verrouillage qui s\u2019active \u00e0 chaque ouverture de l\u2019application :</p><ul><li><b>Verrouillage biom\u00e9trique</b> : utilisez votre empreinte digitale ou reconnaissance faciale.</li><li><b>Verrouillage PIN</b> : d\u00e9finissez un code PIN num\u00e9rique.</li><li><b>Changer le PIN</b> : modifiez votre code PIN existant.</li></ul><p>Vous pouvez activer le verrouillage biom\u00e9trique, le verrouillage PIN, ou les deux. Lorsque les deux sont actifs, l\u2019invite biom\u00e9trique appara\u00eet en premier avec une option "Utiliser le PIN" en secours.</p>' },
      { title:"\u00c9cran de verrouillage", html:'<p>L\u2019\u00e9cran de verrouillage appara\u00eet \u00e0 chaque ouverture de Velora lorsque la s\u00e9curit\u00e9 est activ\u00e9e :</p><h4>Mode PIN</h4><p>Un fond d\u00e9grad\u00e9 avec une ic\u00f4ne de cadenas en haut et un champ de saisie PIN num\u00e9rique. Entrez votre PIN pour d\u00e9verrouiller. En cas d\u2019erreur, un message s\u2019affiche.</p><h4>Mode biom\u00e9trique</h4><p>Un fond d\u00e9grad\u00e9 avec un grand bouton circulaire affichant une ic\u00f4ne de visage ou d\u2019empreinte digitale. Appuyez sur le bouton pour lancer l\u2019authentification biom\u00e9trique. Si la v\u00e9rification \u00e9choue ou n\u2019est pas disponible, appuyez sur <b>"Utiliser le PIN"</b> pour passer \u00e0 la saisie PIN.</p>' },
      { title:"\u00c9cran bloqu\u00e9", html:'<p>Dans certaines situations, l\u2019application peut afficher un \u00e9cran bloqu\u00e9 au lieu de l\u2019\u00e9cran de verrouillage normal :</p><h4>Appareil sur liste noire</h4><p>Si votre appareil a \u00e9t\u00e9 signal\u00e9 ou mis sur liste noire, un \u00e9cran rouge d\u00e9grad\u00e9 appara\u00eet avec une ic\u00f4ne de blocage et un message explicatif. Appuyez sur <b>"V\u00e9rifier \u00e0 nouveau"</b> pour retenter la v\u00e9rification. Votre ID Appareil est affich\u00e9 pour r\u00e9f\u00e9rence aupr\u00e8s du support.</p><h4>Horloge falsifi\u00e9e</h4><p>Si l\u2019application d\u00e9tecte que l\u2019horloge de votre appareil a \u00e9t\u00e9 manuellement modifi\u00e9e (ce qui peut affecter la validation de licence et les rappels programm\u00e9s), un \u00e9cran rouge d\u00e9grad\u00e9 appara\u00eet avec un avertissement. Appuyez sur <b>"V\u00e9rifier l\u2019heure"</b> pour relancer la v\u00e9rification apr\u00e8s avoir corrig\u00e9 l\u2019horloge de votre appareil.</p>' }
    ]
  },
  {
    id:"widget", title:"Widget d\u2019\u00e9cran d\u2019accueil",
    sections:[
      { title:"Widget Android", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-widget.webp" alt="Home Screen Widget" /></div><p>Velora propose un <b>widget d\u2019\u00e9cran d\u2019accueil</b> sur Android pour voir votre progression du jour sans ouvrir l\u2019application.</p><h4>Contenu du widget</h4><ul><li><b>Date</b> : jour et date actuels.</li><li><b>T\u00e2ches</b> : termin\u00e9es / total pour aujourd\u2019hui.</li><li><b>Habitudes</b> : compl\u00e9t\u00e9es / total pour aujourd\u2019hui.</li><li><b>D\u00e9penses</b> : montant total d\u00e9pens\u00e9 aujourd\u2019hui.</li><li><b>Prochaine t\u00e2che</b> : nom et heure d\u2019\u00e9ch\u00e9ance de la prochaine t\u00e2che \u00e0 venir.</li></ul><h4>Ajouter le widget</h4><ol><li>Appui long sur l\u2019\u00e9cran d\u2019accueil.</li><li>Choisissez <b>Widgets</b>.</li><li>Trouvez <b>Velora</b> dans la liste.</li><li>Faites glisser le widget sur l\u2019\u00e9cran d\u2019accueil.</li></ol><p>Le widget se met \u00e0 jour lorsque vous ouvrez Velora ou lorsque vous compl\u00e9tez des t\u00e2ches, des habitudes ou enregistrez des d\u00e9penses.</p>' }
    ]
  },
  {
    id:"license-info", title:"Licence et abonnement",
    sections:[
      { title:"Forfaits d\u2019abonnement", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-license-activate.webp" alt="License Activation" /><img src="../../assets/apps/velora/screenshots/velora-license-buy.webp" alt="License Purchase" /></div><h4>Forfait Standard</h4><p>Acc\u00e8s complet \u00e0 toutes les fonctionnalit\u00e9s principales :</p><ul><li>T\u00e2ches, Habitudes, Objectifs, D\u00e9penses, Dettes.</li><li>Notes, Journal (SoulSync), Suivi d\u2019eau.</li><li>Calendrier, Minuteur Pomodoro, Analytiques, Statistiques.</li><li>Contacts, Recherche globale.</li><li>Sauvegarde cloud et locale.</li><li>Toutes les fonctionnalit\u00e9s de notifications et alarmes.</li></ul><h4>Forfait IA</h4><p>Tout le forfait Standard, plus toutes les fonctionnalit\u00e9s aliment\u00e9es par l\u2019IA :</p><ul><li>Assistant vocal (Chat IA avec saisie vocale et TTS).</li><li>Coach de vie.</li><li>Missions al\u00e9atoires.</li><li>Muse cr\u00e9ative.</li><li>D\u00e9fis dynamiques.</li><li>Capsules temporelles.</li><li>Sujets de journal g\u00e9n\u00e9r\u00e9s par l\u2019IA.</li><li>Rapports par email.</li></ul>' },
      { title:"Acheter une licence", html:'<div class="guide-path">\u00c9cran de licence <i class="bi bi-chevron-right"></i> Onglet Acheter</div><p>Sur l\u2019onglet Acheter :</p><ol><li>S\u00e9lectionnez un <b>forfait</b> : Standard (ic\u00f4ne fus\u00e9e) ou IA (ic\u00f4ne \u00e9toile, marqu\u00e9 "Populaire").</li><li>Utilisez le <b>curseur de dur\u00e9e</b> pour choisir de 1 \u00e0 12 mois, ou appuyez sur une puce rapide (1, 3, 6 ou 12).</li><li>Consultez le <b>r\u00e9sum\u00e9 du prix</b>, y compris les \u00e9conomies pour les dur\u00e9es plus longues.</li><li>Entrez votre <b>nom</b> dans le champ pr\u00e9vu.</li><li>Appuyez sur <b>"Commander via WhatsApp"</b> pour envoyer votre commande. Le paiement se fait via Lumicash.</li></ol>' },
      { title:"Activer une licence", html:'<div class="guide-path">\u00c9cran de licence <i class="bi bi-chevron-right"></i> Onglet Activer</div><p>Apr\u00e8s l\u2019achat, vous recevrez un code d\u2019activation \u00e0 8 caract\u00e8res :</p><ol><li>Entrez le code dans le champ de saisie (affich\u00e9 en police monospace pour la clart\u00e9).</li><li>Appuyez sur <b>"D\u00e9verrouiller"</b> pour activer votre licence.</li><li>Votre <b>ID Appareil</b> est affich\u00e9 en bas. Appuyez dessus pour le copier si n\u00e9cessaire pour le support.</li></ol>' },
      { title:"V\u00e9rifier votre licence", html:'<div class="guide-path">Param\u00e8tres <i class="bi bi-chevron-right"></i> \u00c0 propos <i class="bi bi-chevron-right"></i> Ma licence</div><p>Consultez les d\u00e9tails de votre abonnement actuel : type de forfait (Standard ou IA), date d\u2019expiration et jours restants. Entrez un nouveau code d\u2019activation pour renouveler ou mettre \u00e0 niveau votre licence \u00e0 tout moment.</p>' }
    ]
  }
  ];
