  <script>
  var G = { en:{}, fr:{} };

  /* ═══════════════════════════════════════════════════

     ═══════════════════════════════════════════════════ */

  G.en.title = "Velora: Complete User Guide";
  G.en.subtitle = "Everything you need to know to install, configure, and master Velora for personal productivity and wellness.";
  G.en.download_pdf = "Download PDF";
  G.en.toc_title = "Table of Contents";
  G.en.chapters = [
  {
    id:"install", title:"Installation & First Launch",
    sections:[
      { title:"How to Download & Install", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-splash.webp" alt="Velora Splash Screen" /></div><ol><li>Download the APK file from the link provided or from <a href="../../app.html?id=velora" style="color:var(--accent)">the Sama Apps store</a>.</li><li>If prompted, allow installation from unknown sources: <b>Settings \u2192 Security \u2192 Unknown Sources</b>.</li><li>Tap the downloaded file and press <b>Install</b>.</li><li>Open the app.</li></ol><div class="guide-tip"><i class="bi bi-info-circle"></i> Velora works 100% offline. No internet is required except for cloud backup, license activation, and AI features.</div>' },
      { title:"Splash Screen", html:'<p>When Velora opens, an animated splash screen appears with a smooth color transition, the app logo, a progress bar, and the version number. During this time the app performs several checks in order:</p><ol><li><b>Alarm notification</b>: checks for any pending alarm to display.</li><li><b>Remote config and blacklist</b>: verifies the device is not blocked.</li><li><b>Forced update</b>: checks if a mandatory update is available.</li><li><b>Clock tampering</b>: ensures the device clock has not been altered.</li><li><b>Onboarding</b>: shows the setup wizard if this is the first launch.</li><li><b>License</b>: validates your activation status.</li><li><b>Biometric or PIN lock</b>: prompts for authentication if security is enabled.</li><li><b>Dashboard</b>: loads the main screen once all checks pass.</li></ol>' },
      { title:"License Activation", html:'<p>The license screen displays the app logo, the "Velora" title, and your Device ID at the bottom. There are two tabs:</p><h4>Buy Tab (default)</h4><p>This tab lets you purchase a license:</p><ul><li><b>Pack cards</b>: choose between <b>Standard</b> (with a rocket icon) or <b>AI</b> (with a sparkle icon and a "Popular" badge).</li><li><b>Duration slider</b>: slide from 1 to 12 months. Quick-select chips are available for 1, 3, 6, and 12 months.</li><li><b>Price summary</b>: shows the total price and any savings for longer durations.</li><li><b>Payment info</b>: payment is via Lumicash.</li><li><b>Name field</b>: enter your name for the order.</li><li><b>"Order via WhatsApp" button</b>: sends your order details to WhatsApp for processing.</li><li><b>Device ID</b>: displayed at the bottom for reference.</li></ul><h4>Activate Tab</h4><ul><li>A lock icon and an 8-character activation code input field (monospace font).</li><li>Tap <b>"Unlock"</b> to activate your license.</li><li>Your Device ID is shown at the bottom. Tap it to copy to your clipboard.</li></ul>' },
      { title:"Onboarding (4 Steps)", html:'<p>After license activation on your first launch, a 4-step setup wizard guides you through initial configuration:</p><h4>Step 1: Welcome and Language</h4><p>Choose your preferred language: English or French. The entire app interface switches instantly.</p><h4>Step 2: Cloud Restore (Optional)</h4><p>Sign in with your Google account to restore data from a previous cloud backup. You can also skip this step and set it up later in Settings.</p><h4>Step 3: Dashboard Names</h4><p>Add one or more names that appear in the dashboard greeting. For example, if you add "Alex," the dashboard will say "Good morning, Alex."</p><h4>Step 4: Profile</h4><p>Enter your first and last name. You can add more details (date of birth, email, address, currency) later in Settings \u2192 Profile.</p>' }
    ]
  },
  {
    id:"navigation", title:"Main Navigation",
    sections:[
      { title:"Bottom Navigation Bar", html:'<p>The home screen has a <b>bottom navigation bar</b> with 5 tabs:</p><ol><li><b>Tasks</b>: your full task list with grouping and filters.</li><li><b>Expenses</b>: expense tracking with charts and budgets.</li><li><b>Debts</b>: debt management with partial payments.</li><li><b>Habits</b>: habit tracking with streaks and statistics.</li><li><b>More</b>: opens an animated radial menu with 4 mini action buttons.</li></ol>' },
      { title:"The More Tab: Radial Menu", html:'<p>Tapping the <b>More</b> tab in the bottom navigation does not open a screen directly. Instead, it triggers an <b>animated radial menu</b> that fans out 4 mini floating action buttons:</p><ul><li><b>Notes</b>: opens the Notes screen.</li><li><b>Water</b>: opens the Water Intake tracker.</li><li><b>Journal (SoulSync)</b>: opens the journal screen.</li><li><b>Goals</b>: opens the Goals screen.</li></ul><p>Tap any of the 4 buttons to navigate to that feature, or tap outside the radial menu to close it.</p>' },
      { title:"Top Bar", html:'<p>The top bar is always visible on the home screen and contains the following elements from left to right:</p><ul><li><b>Dashboard icon</b> (far left): opens the Dashboard with your daily overview.</li><li><b>Analytics icon</b>: opens Enhanced Analytics with charts and trends.</li><li><b>"Velora" title</b>: displayed in the center.</li><li><b>Search icon</b>: opens Global Search across all your data.</li><li><b>AI Hub icon</b>: opens the AI features hub.</li><li><b>More menu (\u22ee)</b>: a popup menu with additional options: <b>Contacts</b>, <b>Calendar</b>, <b>Pomodoro</b>, <b>Settings</b>, and <b>Theme Toggle</b> (switch between light and dark mode).</li></ul>' }
    ]
  },
  {
    id:"dashboard", title:"Dashboard",
    sections:[
      { title:"Overview", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-dashboard.webp" alt="Dashboard" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> Dashboard icon (top left)</div><p>The Dashboard is your personal command center. At the top, a personalized greeting displays your name and the current date, followed by a <b>Daily Inspiration</b> quote that changes each day.</p>' },
      { title:"Quick Actions", html:'<p>Below the greeting, four Quick Action buttons let you jump to common tasks:</p><ul><li><b>Add Expense</b>: opens the expense creation form directly.</li><li><b>Journal</b>: opens SoulSync to write a new journal entry.</li><li><b>Habits</b>: navigates to the Habits tab.</li><li><b>Focus</b>: starts the Pomodoro timer for a productivity session.</li></ul>' },
      { title:"Quick Stats & Suggestions", html:'<p>The <b>Quick Stats</b> section shows a snapshot of your day:</p><ul><li>Tasks completed today.</li><li>Water intake progress.</li><li>Today\'s total expenses.</li><li>Current habit streaks.</li><li>Goal progress percentage.</li></ul><p>At the bottom of the Dashboard, <b>Smart Suggestions</b> recommend actions based on your current data. Examples include:</p><ul><li>Review overdue tasks when you have pending items.</li><li>Drink water if your intake is below target.</li><li>Complete a habit that is due today.</li><li>Record today\'s expenses if none are logged yet.</li><li>Write a journal entry if you haven\'t written one recently.</li></ul><p>Tapping <b>"All Features"</b> at the bottom navigates back to the main home screen.</p>' }
    ]
  },
  {
    id:"tasks", title:"Tasks",
    sections:[
      { title:"Viewing Tasks", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-tasks.webp" alt="Tasks" /><img src="../../assets/apps/velora/screenshots/velora-tasks-fab.webp" alt="Quick Add Menu" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> Tab "Tasks"</div><p>Tasks are organized into the following groups:</p><ul><li><b>Overdue</b>: past-due tasks that are automatically rolled forward to today.</li><li><b>Today</b>: tasks due today.</li><li><b>Tomorrow</b>: tasks due tomorrow.</li><li><b>Upcoming</b>: tasks due in the coming days and weeks.</li><li><b>Completed</b>: tasks you have already finished.</li></ul><p>Each task card displays the title, due date, priority indicator, and type (one-time or recurring).</p>' },
      { title:"Creating a Task", html:'<div class="guide-path">Tasks <i class="bi bi-chevron-right"></i> Tap <b>+</b> (bottom right)</div><ol><li>Enter a <b>title</b> (required) and optional <b>description</b>.</li><li>Set the <b>due date and time</b>.</li><li>Toggle <b>Reminder</b> on if you want a notification alert at the due time.</li><li>Choose the task <b>type</b>:<ul><li><b>One-time</b>: a single task that occurs once.</li><li><b>Recurring</b>: repeats on a schedule. Choose <b>Daily</b>, <b>Weekly</b>, or <b>Monthly</b>.</li></ul></li><li>Set <b>priority</b>: Low, Medium, or High. Higher priority tasks appear with a colored indicator.</li><li>Tap <b>Save</b>.</li></ol>' },
      { title:"Managing Tasks", html:'<p>You can manage tasks using the following gestures and actions:</p><ul><li><b>Complete a task</b>: tap the checkbox on the task card.</li><li><b>View details</b>: tap any task card to open a <b>detail bottom sheet</b> showing the priority, due date, reminder time, type, and status. From here you can <b>Mark Complete</b>, <b>Edit</b>, or <b>Delete</b> the task.</li><li><b>Delete a task</b>: swipe the task card to the left. An <b>Undo</b> snackbar appears briefly, allowing you to reverse the deletion.</li></ul>' },
      { title:"Recurring Tasks", html:'<p>When you complete a recurring task, Velora automatically creates a new instance for the next scheduled occurrence (daily, weekly, or monthly). The original recurring template is hidden from the main task list so it does not clutter your view. Only the active instance is visible.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Recurring tasks ensure you never forget repeating responsibilities. Complete today\'s instance, and tomorrow\'s is already waiting.</div>' },
      { title:"Task Filters", html:'<div class="guide-path">Tasks <i class="bi bi-chevron-right"></i> Filter icon (top bar)</div><p>Tap the filter icon to narrow down your task list. Available filters:</p><ul><li><b>Status</b>: All, Pending, Completed, Overdue, Today, Recurring.</li><li><b>Type</b>: One-time or Recurring.</li><li><b>Priority</b>: Low, Medium, High.</li><li><b>Date range</b>: select a start and end date to view tasks within a specific period.</li></ul>' }
    ]
  },
  {
    id:"habits", title:"Habits",
    sections:[
      { title:"Viewing Habits", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-habits.webp" alt="Habits" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> Tab "Habits"</div><p>Each habit appears as a card showing the habit name, frequency chip, current streak count, and a <b>completion control</b>. The control varies by frequency type:</p><ul><li><b>Daily / Specific Days</b>: a circular checkbox. For "Specific Days" habits, a week row (Mon-Sun) appears so you can mark each target day. The control is disabled on non-target days.</li><li><b>Times per Week</b>: an <b>X/Y counter</b> (e.g., 2/5) showing completions this week vs the weekly target.</li><li><b>Times per Month</b>: an <b>X/Y counter</b> (e.g., 8/15) showing completions this month vs the monthly target.</li></ul><p>Tap a habit card to open a bottom sheet with options: <b>Mark Complete</b>, <b>View Details</b>, <b>Edit</b>, or <b>Delete</b>. Swipe left to delete with undo.</p>' },
      { title:"Creating a Habit", html:'<div class="guide-path">Habits <i class="bi bi-chevron-right"></i> Tap <b>+</b></div><ol><li>Enter the <b>habit name</b> (required).</li><li>Add a <b>description</b> and optional <b>notes</b>.</li><li>Choose the <b>frequency</b>:<ul><li><b>Daily</b>: every single day.</li><li><b>Specific Days</b>: select which days of the week (e.g., Mon, Wed, Fri). A day-by-day row (M-S) appears on the habit card so you can complete each day individually.</li><li><b>Times per Week</b>: set a weekly target (1-7 times). The habit card shows an <b>X/Y counter</b> so you can track how many completions remain this week.</li><li><b>Times per Month</b>: set a monthly target (1-30 times). The habit card shows an <b>X/Y counter</b> for the current month.</li></ul></li><li>Optionally <b>link to a Goal</b>. When you complete the habit, the linked goal\'s progress is automatically incremented by the contribution value you set.</li><li>Set a <b>contribution value</b> (how much each completion adds to the linked goal).</li><li>Toggle <b>Reminder</b> on and set a specific time for the notification.</li><li>Tap <b>Save</b>.</li></ol>' },
      { title:"Habit Details", html:'<div class="guide-path">Habits <i class="bi bi-chevron-right"></i> Tap a habit <i class="bi bi-chevron-right"></i> View Details</div><p>The detail screen provides a comprehensive view of your habit performance:</p><ul><li><b>Streak cards</b>: three cards showing your current streak, longest streak ever, and total completed days.</li><li><b>This Week</b>: a day-by-day view of the current week, showing which days you completed the habit.</li><li><b>Calendar</b>: a full month view with completed days highlighted in color.</li><li><b>Linked goal</b>: if the habit is linked to a goal, the goal name and progress are displayed.</li><li><b>Notes</b>: any notes you have attached to the habit.</li></ul>' },
      { title:"Habit Statistics & Streak Screen", html:'<p>From the Habit Details screen, tap <b>View Statistics</b> to access in-depth analytics:</p><ul><li><b>Overall adherence percentage</b>: how consistently you complete the habit across all time.</li><li><b>Monthly adherence percentage</b>: your consistency for the current month.</li><li><b>Heatmap</b>: a visual grid showing your completion consistency over several months.</li><li><b>Completion history</b>: a chronological list of every recorded completion.</li><li><b>7-day completion rate</b>: your percentage over the last week.</li><li><b>30-day completion rate</b>: your percentage over the last month.</li></ul><p>The <b>Streak Screen</b> displays a badge with your current streak, longest streak, total completed days, completion rates, and either a heatmap or weekly history view depending on the habit\'s frequency.</p>' }
    ]
  },
  {
    id:"goals", title:"Goals",
    sections:[
      { title:"Creating a Goal", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-goals.webp" alt="Goals" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More tab (radial menu) <i class="bi bi-chevron-right"></i> Goals <i class="bi bi-chevron-right"></i> Tap <b>+</b></div><ol><li>Enter a <b>title</b> and <b>description</b>.</li><li>Choose a <b>type</b>:<ul><li><b>Savings</b>: track monetary savings toward a target amount.</li><li><b>Fitness</b>: track physical activities or milestones.</li><li><b>Learning</b>: track educational progress.</li><li><b>Personal</b>: general personal development goals.</li><li><b>Checklist</b>: a goal with specific milestone items to check off.</li><li><b>Other</b>: for goals that do not fit the above categories.</li></ul></li><li>For numeric goals (Savings, Fitness, Learning, Personal, Other), set the <b>target value</b> and <b>current value</b>.</li><li>For <b>Checklist</b> goals, add individual <b>checklist items</b> as milestones.</li><li>Set a <b>deadline</b> date.</li><li>Tap <b>Save</b>.</li></ol>' },
      { title:"Tracking Progress", html:'<p>Each goal card displays a progress bar or checklist indicator. Tap a goal to access its management options:</p><ul><li><b>Adjust progress</b>: increment the current value manually.</li><li><b>Set exact value</b>: type in a precise number for the current progress.</li><li><b>Check off milestones</b>: for checklist goals, mark individual items as done.</li><li><b>Mark as Complete</b>: close the goal when you have achieved it.</li><li><b>Edit</b>: modify the goal\'s details.</li><li><b>Delete</b>: remove the goal entirely.</li></ul><div class="guide-tip"><i class="bi bi-info-circle"></i> Link habits to goals for automatic progress. Each time you complete a linked habit, the goal\'s current value increases by the habit\'s contribution amount.</div>' }
    ]
  },
  {
    id:"expenses", title:"Expenses",
    sections:[
      { title:"Viewing Expenses", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-expenses.webp" alt="Expenses" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> Tab "Expenses"</div><p>The Expenses screen offers <b>4 view modes</b> to analyze your spending:</p><ul><li><b>Daily</b>: expenses for a single day.</li><li><b>Weekly</b>: expenses for the current week.</li><li><b>Monthly</b>: expenses for the current month.</li><li><b>Total</b>: all expenses across all time.</li></ul><p>Use the <b>left and right arrow buttons</b> to navigate between dates (previous/next day, week, or month). The screen displays:</p><ul><li><b>Total card</b>: the total spending amount for the selected period.</li><li><b>Pie chart</b>: a visual breakdown of spending by category.</li><li><b>Expense list</b>: individual expense entries with descriptions, amounts, and categories.</li></ul><p>Swipe an expense card to the left to delete it.</p>' },
      { title:"Adding an Expense", html:'<div class="guide-path">Expenses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> Add</div><ol><li>Enter a <b>description</b> of the expense.</li><li>Enter the <b>amount</b>.</li><li>Select a <b>category</b>: Food, Transport, Housing, Health, Education, Entertainment, and more.</li><li>Set the <b>date</b> for the expense.</li><li>Optionally mark as <b>recurring</b>:<ul><li><b>Daily</b>: repeats every day.</li><li><b>Weekly</b>: repeats every week.</li><li><b>Monthly</b>: repeats every month.</li><li><b>Custom days</b>: choose specific days of the week.</li></ul></li><li>A <b>budget indicator</b> shows how much budget remains for the selected category, if a budget is set.</li><li>Tap <b>Save</b>.</li></ol>' },
      { title:"FAB Actions", html:'<p>The floating action button (FAB) on the Expenses screen expands to reveal 4 actions:</p><ul><li><b>Recurring</b>: manage recurring expense templates.</li><li><b>Budget</b>: open budget management.</li><li><b>Summary</b>: view a detailed expense summary.</li><li><b>Add</b>: create a new expense entry.</li></ul>' },
      { title:"Expense Summary", html:'<div class="guide-path">Expenses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> Summary</div><p>The summary screen provides a detailed analysis of your spending:</p><ul><li><b>Date selector</b>: pick a month to analyze.</li><li><b>Total amount</b>: overall spending for the selected period.</li><li><b>Category breakdown</b>: each category is listed with its total amount and a progress bar showing its proportion of total spending.</li></ul><p>Tap a category to see its <b>Category Summary</b>, a detailed breakdown showing every individual expense in that category.</p>' },
      { title:"Budget Management", html:'<div class="guide-path">Expenses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> Budget</div><p>Budgets help you control spending by setting limits per category:</p><ol><li>Tap <b>+</b> to add a new budget.</li><li>Select a <b>category</b>.</li><li>Set the <b>monthly limit</b> amount.</li><li>Tap <b>Save</b>.</li></ol><p>Each budget displays a visual progress bar showing how much of the limit has been spent. When your spending approaches or exceeds the limit, the app shows a warning alert. The budget indicator also appears when adding new expenses, so you always know how much room you have left.</p>' },
      { title:"Recurring Expenses", html:'<div class="guide-path">Expenses <i class="bi bi-chevron-right"></i> FAB <i class="bi bi-chevron-right"></i> Recurring</div><p>View all active recurring expense templates. For each template, you can:</p><ul><li><b>Edit</b>: change the description, amount, category, or frequency.</li><li><b>Stop</b>: deactivate the template so no future entries are created.</li><li><b>Delete</b>: remove the template only, or delete the template along with all its generated instances.</li></ul>' }
    ]
  },
  {
    id:"debts", title:"Debts",
    sections:[
      { title:"Viewing Debts", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-debts.webp" alt="Debts" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> Tab "Debts"</div><p>The Debts screen opens with a summary banner showing two totals:</p><ul><li><b>You owe</b>: the combined amount of all debts you owe to others.</li><li><b>Owed to you</b>: the combined amount others owe you.</li></ul><p>Filter the debt list using the tabs at the top: <b>All</b>, <b>Unpaid</b>, or <b>Paid</b>. Swipe a debt card to the left to delete it.</p>' },
      { title:"Adding a Debt", html:'<div class="guide-path">Debts <i class="bi bi-chevron-right"></i> Tap <b>+</b></div><ol><li>Enter the <b>person\'s name</b> (who owes or is owed).</li><li>Enter the <b>amount</b>.</li><li>Add a <b>description</b> of what the debt is for.</li><li>Choose the <b>type</b>:<ul><li><b>I owe</b>: you owe this person money.</li><li><b>Owed to me</b>: this person owes you money.</li></ul></li><li>Optionally set a <b>due date</b>.</li><li>Tap <b>Save</b>.</li></ol>' },
      { title:"Making Payments", html:'<p>From a debt card, you have several actions available:</p><ul><li><b>Make a partial payment</b>: enter a payment amount to reduce the remaining balance. The debt card updates to show the new balance.</li><li><b>Mark as paid</b>: closes the debt entirely and moves it to the Paid filter.</li><li><b>Edit</b>: modify the debt details.</li><li><b>Delete</b>: remove the debt record.</li></ul>' }
    ]
  },
  {
    id:"journal", title:"Journal (SoulSync)",
    sections:[
      { title:"Writing Journal Entries", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-journal.webp" alt="Journal" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More tab (radial menu) <i class="bi bi-chevron-right"></i> SoulSync <i class="bi bi-chevron-right"></i> Tap <b>+</b></div><ol><li>Optionally choose a <b>writing prompt</b> to inspire your entry. Prompts come in two varieties:<ul><li><b>Static prompts</b>: pre-written prompts that rotate daily.</li><li><b>AI-generated prompts</b>: personalized prompts created by the AI based on your data (requires AI license).</li></ul></li><li>Write your <b>journal entry</b> in the text area.</li><li>Select your current <b>mood</b> from the mood picker. The 20 available moods are: Happy, Sad, Neutral, Excited, Calm, Anxious, Grateful, Angry, Loved, Peaceful, Stressed, Energetic, Tired, Hopeful, Lonely, Confused, Proud, Disappointed, Content, and Inspired. Each mood has its own icon and color.</li><li>Add <b>tags</b> to categorize your entry (e.g., "gratitude," "work," "family").</li><li>Tap <b>Save</b>.</li></ol>' },
      { title:"Browsing Entries", html:'<p>Journal entries appear as cards showing the date, mood icon, a content preview, and tags. Tap an entry to read the full text or edit it. Swipe an entry to the left to delete it.</p><p>Use the FAB button (<b>+</b>) to create a new entry at any time.</p>' }
    ]
  },
  {
    id:"notes", title:"Notes",
    sections:[
      { title:"Creating & Editing Notes", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-notes.webp" alt="Notes" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More tab (radial menu) <i class="bi bi-chevron-right"></i> Notes <i class="bi bi-chevron-right"></i> Tap <b>+</b></div><ol><li>Enter a <b>title</b> for the note.</li><li>Write the <b>content</b> in the body field.</li><li>Add one or more <b>tags</b> to organize your notes. You can add new tags or remove existing ones.</li><li>Tap <b>Save</b>.</li></ol><p>Tap any note card to open and edit it. Each card shows the title and a content preview. Swipe a note to the left to delete it.</p>' },
      { title:"Searching & Filtering", html:'<p>At the top of the Notes screen:</p><ul><li><b>Search bar</b>: type keywords to search across note titles and content.</li><li><b>Tag filter chips</b>: tap a tag chip to show only notes with that tag.</li><li><b>Rename tags</b>: long-press a tag chip to rename it. The new name is applied to all notes using that tag.</li></ul>' }
    ]
  },
  {
    id:"water", title:"Water Intake",
    sections:[
      { title:"Tracking Your Water", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-water.webp" alt="Water Intake" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More tab (radial menu) <i class="bi bi-chevron-right"></i> Water</div><p>The Water Intake screen features a visual glass that fills up with an animated water level as you log your intake. Your progress toward the daily goal is displayed as a percentage.</p><p>Three <b>quick-add buttons</b> let you log water instantly:</p><ul><li><b>250 ml</b></li><li><b>500 ml</b></li><li><b>750 ml</b></li></ul><p>Tap <b>Reset</b> at the bottom to clear today\'s intake and start over. The maximum daily intake is capped at 5 liters.</p><p>When you reach your daily goal, a <b>confetti animation</b> celebrates your achievement with haptic feedback.</p>' },
      { title:"Settings & History", html:'<p>Tap the <b>gear icon</b> to configure your <b>daily water goal</b> in milliliters.</p><p>The <b>History</b> section shows a <b>weekly line chart</b> of your daily intake with a horizontal <b>goal line</b>, so you can track your hydration consistency over time. Tap the <b>history icon</b> in the top bar for a detailed log of all your intake entries.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Enable Water Reminders in Settings \u2192 Notifications to receive periodic nudges to drink water throughout the day.</div>' }
    ]
  },
  {
    id:"ai", title:"AI Hub",
    sections:[
      { title:"Overview", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-ai-hub.webp" alt="AI Hub" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> AI Hub icon (top bar)</div><p>The AI Hub is your gateway to all AI-powered features in Velora. It requires the <b>AI subscription</b> and an internet connection. Standard users see a preview of each feature with an upgrade prompt.</p><p>Available AI features:</p><ul><li><b>Voice Assistant</b>: chat with an AI assistant using text or voice.</li><li><b>Life Coach</b>: receive personalized guidance for personal development.</li><li><b>Random Missions</b>: get AI-generated productivity challenges and mini-tasks.</li><li><b>Creative Muse</b>: find creative inspiration, writing prompts, and ideas.</li><li><b>Dynamic Challenges</b>: receive personalized challenges tailored to your data and habits.</li><li><b>Legacy Capsules</b>: create time-locked messages to your future self.</li></ul><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> AI features require an active internet connection and the AI subscription tier. Standard license users see a preview with an upgrade prompt.</div>' },
      { title:"AI Chat", html:'<div class="guide-path">AI Hub <i class="bi bi-chevron-right"></i> Voice Assistant</div><p>The AI Chat screen provides a full conversational interface with rich input options:</p><h4>Conversations</h4><p>Open the <b>conversation drawer</b> to manage your chats. You can <b>create</b> new conversations, <b>switch</b> between existing ones, or <b>delete</b> old conversations you no longer need.</p><h4>Context Toggle</h4><p>Switch between two modes at the top of the chat:</p><ul><li><b>Personal context</b>: the AI uses your app data (tasks, habits, goals, expenses, journal entries) to provide personalized advice and insights.</li><li><b>General context</b>: the AI responds with general knowledge, without referencing your personal data.</li></ul><h4>Text-to-Speech (TTS)</h4><p>Toggle TTS on so the AI reads its responses aloud. This is useful for hands-free listening while you focus on other activities.</p><h4>Voice Input</h4><p>Voice input provides a natural way to interact with the AI:</p><ul><li><b>Long-press the microphone</b> button to start recording your voice.</li><li><b>Drag up</b> to lock the recording into hands-free mode, so you can release your finger and keep talking.</li><li><b>Drag left</b> to cancel the recording without sending.</li><li>Release the button to send the voice message for processing.</li></ul><h4>Text Input</h4><p>Type your message in the text field at the bottom and tap send. The AI responds in the conversation view above.</p>' },
      { title:"Legacy Capsules", html:'<div class="guide-path">AI Hub <i class="bi bi-chevron-right"></i> Legacy Capsules</div><p>Legacy Capsules let you write time-locked messages to your future self or to someone else. The capsule remains sealed until the unlock date arrives.</p><ol><li>Tap <b>+</b> to create a new capsule.</li><li>Write your <b>message</b> content. You can also use the <b>AI auto-generate</b> option to have the AI write or suggest a message for you.</li><li>Set the <b>open date</b>. The minimum date is tomorrow; you cannot set it to today.</li><li>Optionally add a <b>recipient name</b> and <b>email</b> if you want to dedicate or send the capsule to someone else.</li><li>Tap <b>Save</b>.</li></ol><p>Once saved, the capsule is sealed and cannot be opened until the set date. You can also <b>share a link</b> to the capsule with others.</p>' }
    ]
  },
  {
    id:"calendar", title:"Calendar",
    sections:[
      { title:"Calendar View", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-calendar.webp" alt="Calendar" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More menu (\u22ee) <i class="bi bi-chevron-right"></i> Calendar</div><p>The Calendar screen displays events from multiple data types on their relevant dates:</p><ul><li><b>Tasks</b>: shown on their due dates.</li><li><b>Debts</b>: shown on their due dates.</li><li><b>Goals</b>: shown on their deadline dates.</li><li><b>Habits</b>: shown on their scheduled days.</li><li><b>Expenses</b>: shown on the dates they were recorded.</li></ul><h4>View Modes</h4><p>Switch between three calendar views:</p><ul><li><b>Month</b>: see the full month at a glance.</li><li><b>Two Weeks</b>: a 14-day rolling view.</li><li><b>Week</b>: a detailed 7-day view.</li></ul><p>Tap the <b>Today</b> button to jump back to the current date.</p><h4>Interacting with Events</h4><p>Tap any <b>date</b> to see all events scheduled on that day listed below the calendar. Tap a <b>task event</b> to open it for editing. Use the <b>FAB (+)</b> button to add a new task for the currently selected date.</p>' }
    ]
  },
  {
    id:"pomodoro", title:"Pomodoro Timer",
    sections:[
      { title:"Focus Sessions", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-pomodoro.webp" alt="Pomodoro Timer" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More menu (\u22ee) <i class="bi bi-chevron-right"></i> Pomodoro</div><p>The Pomodoro Timer helps you focus using structured work and break cycles. Here is how a typical session works:</p><ol><li>Optionally <b>link a task</b> to the session so your focus time is tracked against a specific task.</li><li>Press <b>Start</b> to begin the work period.</li><li>When the work timer ends, the app prompts you to take a break.</li><li>After the break, the next work session begins automatically.</li><li>After a set number of sessions, you get a longer break.</li></ol>' },
      { title:"Timer Controls", html:'<p>During a session, you have the following controls:</p><ul><li><b>Start / Pause</b>: begin or pause the current timer.</li><li><b>Reset</b>: reset the timer back to its starting value without completing the session.</li><li><b>Skip Break</b>: when on a break, skip it and move directly to the next work session.</li></ul><p>The <b>Today Stats</b> panel (always visible) shows your completed sessions count, total focus time for the day, and your current daily streak.</p><p>The timer includes a <b>ringtone and vibration</b> when each session ends, and can <b>auto-start the next session</b> for uninterrupted flow.</p>' },
      { title:"Pomodoro Settings", html:'<p>Tap the gear icon to configure the timer to your preference:</p><ul><li><b>Work duration</b>: how long each focus session lasts (default: 25 minutes, range: 5 to 60 minutes).</li><li><b>Short break duration</b>: rest time between work sessions (default: 5 minutes, range: 1 to 15 minutes).</li><li><b>Long break duration</b>: longer rest after a set number of sessions (default: 15 minutes, range: 5 to 30 minutes).</li><li><b>Sessions before long break</b>: how many work sessions to complete before taking a long break (default: 4).</li><li><b>Ambient sound</b>: enable background sound during focus sessions. Choose from: <b>Rain</b>, <b>Forest</b>, <b>Ocean</b>, <b>Coffee Shop</b>, <b>Fireplace</b>, or <b>White Noise</b>. Adjust the volume with the slider.</li></ul>' },
      { title:"Session History", html:'<p>Access the <b>History</b> view to see a record of all past Pomodoro sessions, including dates, durations, linked tasks, and the number of completed cycles.</p>' }
    ]
  },
  {
    id:"analytics", title:"Analytics & Statistics",
    sections:[
      { title:"Enhanced Analytics", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-analytics.webp" alt="Analytics" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> Analytics icon (top bar)</div><p>Enhanced Analytics provides visual charts and trend data over time. Select a period at the top: <b>Week</b>, <b>Month</b>, or <b>Quarter</b>.</p><p>Available charts:</p><ul><li><b>Expense trend</b>: a chart showing your spending patterns over the selected period.</li><li><b>Habit adherence</b>: your habit completion rate graphed over time.</li><li><b>Task completion trend</b>: how many tasks you completed versus how many were created.</li><li><b>Period comparison</b>: compares the current period (this week, month, or quarter) against the previous one, highlighting improvements or declines.</li></ul>' },
      { title:"Statistics Screen", html:'<p>The Statistics screen focuses on summary numbers rather than trend charts. Toggle between <b>Week</b> and <b>Month</b> at the top.</p><h4>Tasks Overview</h4><ul><li>Total tasks for the period.</li><li>Completed tasks.</li><li>Pending tasks.</li><li>Completion rate percentage.</li></ul><h4>Expenses</h4><ul><li>Total expense amount for the period.</li><li>Pie chart breakdown by category (in monthly view).</li><li>Category legend with individual amounts.</li></ul><h4>Habits</h4><ul><li>Total habits being tracked.</li><li>Total completions for the period.</li><li>Average completions per day.</li></ul><div class="guide-tip"><i class="bi bi-info-circle"></i> Analytics shows <b>trends over time</b> (how things change), while Statistics shows <b>summary totals</b> (where things stand now). Use both for a complete picture of your productivity.</div>' }
    ]
  },
  {
    id:"search", title:"Global Search",
    sections:[
      { title:"Searching Everything", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-search.webp" alt="Global Search" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> Search icon (top bar)</div><p>Global Search lets you find anything across your entire Velora data. Type a keyword and results appear instantly, grouped by type:</p><ul><li><b>Tasks</b></li><li><b>Expenses</b></li><li><b>Notes</b></li><li><b>Habits</b></li><li><b>Debts</b></li><li><b>Goals</b></li><li><b>Contacts</b></li></ul><p>Tap any result to navigate directly to that item for viewing or editing.</p>' }
    ]
  },
  {
    id:"contacts", title:"Contacts",
    sections:[
      { title:"Managing Contacts", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-contacts.webp" alt="Contacts" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More menu (\u22ee) <i class="bi bi-chevron-right"></i> Contacts</div><p>Velora includes a built-in contact book. You can store contacts used across other features (such as debts).</p><ul><li><b>Search</b>: use the search bar at the top to find contacts by name.</li><li><b>Add</b>: tap <b>+</b> to create a contact. <b>Name</b> and <b>Phone</b> are required. <b>Email</b> is optional.</li><li><b>Edit</b>: tap a contact card to modify its details.</li><li><b>Delete</b>: remove a contact. Deleted contacts go to the Trash, where you can restore them via undo.</li></ul>' }
    ]
  },
  {
    id:"notifications", title:"Notifications & Reminders",
    sections:[
      { title:"Notification Settings", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-notifications.webp" alt="Notifications" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More menu (\u22ee) <i class="bi bi-chevron-right"></i> Settings <i class="bi bi-chevron-right"></i> Notifications & Reports</div><p>Configure each notification type individually:</p><ul><li><b>Morning Summary</b>: toggle on and set a time to receive a daily overview notification.</li><li><b>Daily Inspiration</b>: toggle on and set a time for a motivational quote notification.</li><li><b>Task Reminders</b>: toggle to receive alerts for upcoming tasks at their due times.</li><li><b>Habit Reminders</b>: toggle to receive nudges to complete your habits.</li><li><b>Debt Reminders</b>: toggle to receive alerts for upcoming debt due dates.</li><li><b>Goal Reminders</b>: toggle to receive progress nudges for your goals.</li><li><b>Water Reminders</b>: toggle to receive periodic hydration reminders throughout the day.</li></ul><p>Additional options on this screen:</p><ul><li><b>Alarm settings</b>: configure how alarm notifications look and behave.</li><li><b>Clear All</b>: reset all notification toggles and times.</li><li><b>Open System Settings</b>: jump to your device\'s notification settings for fine-grained control over permissions and channels.</li></ul>' },
      { title:"Email Reports", html:'<p>Within the Notifications & Reports screen, you can configure <b>Email Reports</b>:</p><ol><li>Check your <b>email status</b> (whether an email address is linked).</li><li>Enable the <b>master toggle</b> to activate email reports.</li><li>Set the <b>delivery time</b> for when reports are sent.</li><li>Choose which <b>content</b> to include in your reports:<ul><li>Task summary</li><li>Habit summary</li><li>Goal summary</li><li>Expense summary</li><li>Debt summary</li></ul></li></ol><div class="guide-warn"><i class="bi bi-exclamation-triangle"></i> Email Reports require the <b>AI license</b> to function. Standard license users cannot enable this feature.</div>' },
      { title:"Alarm Screen", html:'<p>When a task or habit reminder fires, a <b>full-screen alarm</b> takes over the display with:</p><ul><li>A <b>pulsing icon</b> animation to catch your attention.</li><li>The <b>task or habit name</b> and its description.</li><li>The <b>current time</b>.</li></ul><p>You have two options:</p><ul><li><b>Snooze</b>: postpone the alarm. Choose from 5, 15, 30, or 60 minutes.</li><li><b>Dismiss</b>: silence the alarm and return to the app.</li></ul>' }
    ]
  },
  {
    id:"backup", title:"Backup & Restore",
    sections:[
      { title:"Cloud Backup (Google Drive)", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-backup.webp" alt="Backup & Restore" /></div><div class="guide-path">Settings <i class="bi bi-chevron-right"></i> Backup & Restore <i class="bi bi-chevron-right"></i> Cloud</div><ol><li><b>Sign in</b> with your Google account.</li><li>Accept the <b>consent dialog</b>, which includes links to the terms of service and privacy policy.</li><li>Choose which <b>data types</b> to include in the backup using the data type selector.</li><li>Tap <b>Backup Now</b> to create an immediate backup.</li><li>Set the <b>auto-backup frequency</b>: Daily, Weekly, or Monthly.</li></ol><p>Once signed in, your <b>profile photo</b> and <b>email address</b> are displayed on the backup screen.</p><p>To restore data on a new device:</p><ol><li>Sign in with the same Google account.</li><li>Select a backup from the <b>backup list</b>.</li><li>Tap <b>Restore</b>.</li></ol><p>Tap <b>Sign Out</b> to disconnect your Google account from cloud backup.</p><div class="guide-tip"><i class="bi bi-info-circle"></i> Your data is stored in YOUR Google Drive account. Velora never accesses or stores your Google Drive files on its servers.</div>' },
      { title:"Local Backup", html:'<div class="guide-path">Settings <i class="bi bi-chevron-right"></i> Backup & Restore <i class="bi bi-chevron-right"></i> Local</div><p>Export your data as a local backup file to your device storage. To restore, import a previously exported backup file. This is useful for transferring data between devices without a Google account.</p>' }
    ]
  },
  {
    id:"settings", title:"Settings & Profile",
    sections:[
      { title:"Profile", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-settings.webp" alt="Settings" /></div><div class="guide-path">Home <i class="bi bi-chevron-right"></i> More menu (\u22ee) <i class="bi bi-chevron-right"></i> Settings <i class="bi bi-chevron-right"></i> Profile</div><p>Manage your personal information:</p><ul><li><b>First name</b> and <b>Last name</b>.</li><li><b>Date of birth</b>: selected via a date picker.</li><li><b>Email address</b>.</li><li><b>Address</b>.</li><li><b>Currency</b>: select the currency used for expenses, debts, and goals.</li></ul><p>The <b>Dashboard Names</b> link opens a separate screen where you can add or remove the greeting names that appear on the dashboard (e.g., "Good morning, Alex").</p>' },
      { title:"Language", html:'<p>Switch between <b>English</b> and <b>French</b>. The entire app interface, including all labels, buttons, messages, and notifications, switches instantly when you change the language. No restart is required.</p>' },
      { title:"Trash", html:'<div class="guide-path">Settings <i class="bi bi-chevron-right"></i> Trash</div><p>Deleted items are moved to the Trash instead of being permanently removed. The Trash screen lets you filter items by type using the following categories:</p><ul><li><b>All</b>: show all deleted items.</li><li><b>Task</b></li><li><b>Expense</b></li><li><b>Habit</b></li><li><b>Goal</b></li><li><b>Debt</b></li><li><b>Note</b></li><li><b>Contact</b></li><li><b>Journal</b></li><li><b>Budget</b></li><li><b>Capsule</b></li><li><b>Conversation</b></li></ul><p>For each item in the Trash, you can:</p><ul><li><b>Restore</b>: bring the item back to its original location.</li><li><b>Delete permanently</b>: remove the item forever with no recovery.</li></ul><p>Tap <b>Empty Trash</b> to permanently delete all items in the trash at once.</p>' },
      { title:"About & Legal", html:'<h4>About</h4><ul><li><b>App version</b>: the currently installed version number.</li><li><b>Check for updates</b>: see if a newer version is available for download.</li><li><b>Contact support</b>: reach out via <b>WhatsApp</b> or <b>Email</b> for help.</li></ul><h4>Legal</h4><ul><li><b>Privacy Policy</b>: read the full privacy policy.</li><li><b>Terms of Use</b>: read the terms and conditions.</li><li><b>User Guide</b>: open this guide from within the app.</li></ul>' }
    ]
  },
  {
    id:"security", title:"Security & Lock Screen",
    sections:[
      { title:"Security Settings", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-lockscreen.webp" alt="Lock Screen" /></div><div class="guide-path">Settings <i class="bi bi-chevron-right"></i> Security</div><p>Protect your data with a lock screen that activates each time you open the app:</p><ul><li><b>Biometric lock</b>: use your fingerprint or face recognition to unlock the app.</li><li><b>PIN lock</b>: set a numeric PIN code for app access.</li><li><b>Change PIN</b>: update your existing PIN code.</li></ul><p>You can enable biometric lock, PIN lock, or both. When both are active, the biometric prompt appears first with a "Use PIN Instead" fallback option.</p>' },
      { title:"Lock Screen", html:'<p>The lock screen appears whenever you open Velora and security is enabled:</p><h4>PIN Mode</h4><p>A gradient background with a lock icon at the top and a numeric PIN input field. Enter your PIN to unlock the app. If the wrong PIN is entered, an error message is displayed.</p><h4>Biometric Mode</h4><p>A gradient background with a large circular button displaying a face or fingerprint icon. Tap the button to trigger biometric authentication. If biometric verification fails or is unavailable, tap <b>"Use PIN Instead"</b> to fall back to PIN entry.</p>' },
      { title:"Blocked Screen", html:'<p>In certain situations, the app may display a blocked screen instead of the normal lock screen:</p><h4>Blacklisted Device</h4><p>If your device has been flagged or blacklisted, a red gradient screen appears with a block icon and a message explaining the situation. Tap <b>"Check Again"</b> to retry verification. Your Device ID is displayed on this screen for support reference.</p><h4>Clock Tampered</h4><p>If the app detects that your device clock has been manually altered (which can affect license validation and scheduled reminders), a red gradient screen appears with a warning message. Tap <b>"Check Time"</b> to re-verify after correcting your device clock to the accurate time.</p>' }
    ]
  },
  {
    id:"widget", title:"Home Screen Widget",
    sections:[
      { title:"Android Widget", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-widget.webp" alt="Home Screen Widget" /></div><p>Velora includes a <b>home screen widget</b> for Android that lets you see your daily progress at a glance without opening the app.</p><h4>Widget Content</h4><ul><li><b>Date</b>: the current day and date.</li><li><b>Tasks</b>: completed vs total tasks for today.</li><li><b>Habits</b>: completed vs total habits for today.</li><li><b>Expenses</b>: total amount spent today.</li><li><b>Next task</b>: the name and due time of your next upcoming task.</li></ul><h4>Adding the Widget</h4><ol><li>Long-press on your home screen.</li><li>Select <b>Widgets</b>.</li><li>Find <b>Velora</b> in the widget list.</li><li>Drag and drop it onto your home screen.</li></ol><p>The widget updates automatically whenever you open Velora or complete tasks, habits, or log expenses.</p>' }
    ]
  },
  {
    id:"license-info", title:"License & Subscription",
    sections:[
      { title:"Subscription Packs", html:'<div class="guide-screenshots"><img src="../../assets/apps/velora/screenshots/velora-license-activate.webp" alt="License Activation" /><img src="../../assets/apps/velora/screenshots/velora-license-buy.webp" alt="License Purchase" /></div><h4>Standard Pack</h4><p>Full access to all core features:</p><ul><li>Tasks, Habits, Goals, Expenses, Debts.</li><li>Notes, Journal (SoulSync), Water Tracking.</li><li>Calendar, Pomodoro Timer, Analytics, Statistics.</li><li>Contacts, Global Search.</li><li>Cloud and Local Backup.</li><li>All notification and alarm features.</li></ul><h4>AI Pack</h4><p>Everything in the Standard pack, plus all AI-powered features:</p><ul><li>Voice Assistant (AI Chat with voice input and TTS).</li><li>Life Coach.</li><li>Random Missions.</li><li>Creative Muse.</li><li>Dynamic Challenges.</li><li>Legacy Capsules.</li><li>AI-generated journal writing prompts.</li><li>Email Reports.</li></ul>' },
      { title:"Buying a License", html:'<div class="guide-path">License Screen <i class="bi bi-chevron-right"></i> Buy tab</div><p>On the Buy tab:</p><ol><li>Select a <b>pack</b>: Standard (rocket icon) or AI (sparkle icon, marked "Popular").</li><li>Use the <b>duration slider</b> to choose 1 to 12 months, or tap a quick chip (1, 3, 6, or 12).</li><li>Review the <b>price summary</b>, including any savings for longer durations.</li><li>Enter your <b>name</b> in the name field.</li><li>Tap <b>"Order via WhatsApp"</b> to send your order. Payment is processed via Lumicash.</li></ol>' },
      { title:"Activating a License", html:'<div class="guide-path">License Screen <i class="bi bi-chevron-right"></i> Activate tab</div><p>After purchasing, you will receive an 8-character activation code:</p><ol><li>Enter the code in the input field (displayed in monospace font for clarity).</li><li>Tap <b>"Unlock"</b> to activate your license.</li><li>Your <b>Device ID</b> is shown at the bottom. Tap it to copy if needed for support purposes.</li></ol>' },
      { title:"Checking Your License", html:'<div class="guide-path">Settings <i class="bi bi-chevron-right"></i> About <i class="bi bi-chevron-right"></i> My License</div><p>View your current subscription details: pack type (Standard or AI), expiry date, and days remaining. Enter a new activation code to renew or upgrade your license at any time.</p>' }
    ]
  }
  ];
