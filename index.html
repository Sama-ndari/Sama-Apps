<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sama Apps — Mobile App Marketplace</title>
  <meta name="description" content="Discover and download quality Android apps built by independent developers." />
  <link rel="icon" href="assets/img/favicon.ico" />
  <link rel="apple-touch-icon" href="assets/img/logo.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Sama Apps - Mobile App Marketplace" />
  <meta property="og:description" content="Discover and download quality Android apps built by independent developers. No Play Store needed." />
  <meta property="og:image" content="https://apps.samandari.dev/Sama-Apps/assets/img/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="654" />
  <meta property="og:url" content="https://apps.samandari.dev/Sama-Apps/" />
  <meta property="og:site_name" content="Sama Apps" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sama Apps - Mobile App Marketplace" />
  <meta name="twitter:description" content="Discover and download quality Android apps. No Play Store needed." />
  <meta name="twitter:image" content="https://apps.samandari.dev/Sama-Apps/assets/img/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="assets/img/logo.png" alt="Sama Apps" class="header__logo-img" />
        <span>Sama Apps</span>
      </a>
      <div class="header__search">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" autocomplete="off" />
      </div>
      <nav class="header__nav">
        <button class="header__toggle" id="langToggle" title="Language">EN</button>
        <button class="header__toggle" id="themeToggle" title="Theme">
          <i class="bi bi-moon-fill"></i>
        </button>
        <a href="https://apps.samandari.dev/" target="_blank" class="header__link" aria-label="Portfolio">
          <i class="bi bi-globe2"></i>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1 class="hero__title" id="heroTitle"></h1>
        <p class="hero__subtitle" id="heroSubtitle"></p>
        <div class="hero__search-mobile">
          <i class="bi bi-search"></i>
          <input type="text" id="searchInputMobile" autocomplete="off" />
        </div>
      </div>
    </section>

    <div class="stats-banner" id="statsBanner" hidden>
      <div class="container stats-banner__inner">
        <span class="stats-banner__icon"><i class="bi bi-people-fill"></i></span>
        <span class="stats-banner__text" id="statsBannerText"></span>
      </div>
    </div>

    <section class="catalog" id="catalog">
      <div class="container">
        <div class="catalog__filters" id="filters"></div>
        <div class="catalog__grid" id="appGrid"></div>
        <p class="catalog__empty" id="emptyState" hidden></p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p id="footerRights"></p>
      <p class="footer__credit"><span id="footerBuilt"></span> <a href="https://apps.samandari.dev/" target="_blank">Samandari</a></p>
    </div>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/apps.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
