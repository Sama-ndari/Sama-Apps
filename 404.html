<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Sama Apps</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <link rel="icon" href="/assets/img/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    .error-page__code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .error-page__title {
      font-size: 1.5rem;
      font-weight: 600;
      margin: .5rem 0 1rem;
      color: var(--text);
    }
    .error-page__desc {
      color: var(--muted);
      max-width: 420px;
      margin-bottom: 2rem;
    }
    .error-page__btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      transition: background .2s;
    }
    .error-page__btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="header__logo">
        <img src="/assets/img/logo.png" alt="Sama Apps" class="header__logo-img" />
        <span>Sama Apps</span>
      </a>
    </div>
  </header>

  <main class="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title" id="errorTitle">Page not found</h1>
    <p class="error-page__desc" id="errorDesc">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="error-page__btn" id="errorBtn">
      <i class="bi bi-house"></i>
      <span>Back to Home</span>
    </a>
  </main>

  <script>
    (function() {
      var lang = (navigator.language || '').slice(0,2);
      if (lang === 'fr') {
        document.getElementById('errorTitle').textContent = 'Page introuvable';
        document.getElementById('errorDesc').textContent = "La page que vous cherchez n'existe pas ou a été déplacée.";
        document.getElementById('errorBtn').querySelector('span').textContent = "Retour à l'accueil";
      }
      setTimeout(function() { window.location.href = '/'; }, 8000);
    })();
  </script>
</body>
</html>
