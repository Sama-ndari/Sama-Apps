<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Details — Sama Apps</title>
  <meta name="description" content="App details and download" />
  <link rel="icon" href="assets/img/favicon.ico" />
  <link rel="apple-touch-icon" href="assets/img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/legal.css" />
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="assets/img/logo.png" alt="Sama Apps" class="header__logo-img" />
        <span>Sama Apps</span>
      </a>
      <nav class="header__nav">
        <button class="header__toggle" id="langToggle" title="Language">EN</button>
        <button class="header__toggle" id="themeToggle" title="Theme">
          <i class="bi bi-moon-fill"></i>
        </button>
        <a href="https://sama-ndari.github.io/Portfolio/" target="_blank" class="header__link" aria-label="Portfolio">
          <i class="bi bi-globe2"></i>
        </a>
        <a href="index.html" class="header__link header__link--back" id="backLink">
          <i class="bi bi-arrow-left"></i> <span>Back</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="app-detail" id="appDetail">
      <div class="container">
        <div class="app-hero" id="appHero"></div>
        <div class="app-content">
          <div class="app-content__main">
            <div class="app-trial" id="trialBanner" hidden></div>
            <div class="app-videos" id="videosSection" hidden></div>
            <div class="app-screenshots" id="screenshotsSection" hidden>
              <h3 id="screenshotsTitle"></h3>
              <div class="screenshots-track" id="screenshotsTrack"></div>
            </div>
            <div class="app-description">
              <h3 id="aboutTitle"></h3>
              <p id="appDescription"></p>
            </div>
            <div class="app-features">
              <h3 id="featuresTitle"></h3>
              <ul id="featuresList"></ul>
            </div>
          </div>
          <aside class="app-sidebar">
            <div class="sidebar-card" id="sidebarInfo"></div>
            <div class="sidebar-card sidebar-card--tiers" id="sidebarTiers" hidden></div>
            <div class="sidebar-card sidebar-card--legal" id="sidebarLegal" hidden></div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox__close" id="lightboxClose"><i class="bi bi-x-lg"></i></button>
    <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev"><i class="bi bi-chevron-left"></i></button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="Screenshot" />
    <button class="lightbox__nav lightbox__nav--next" id="lightboxNext"><i class="bi bi-chevron-right"></i></button>
  </div>

  <footer class="footer">
    <div class="container footer__inner">
      <p id="footerRights"></p>
      <p class="footer__credit"><span id="footerBuilt"></span> <a href="https://github.com/Sama-ndari" target="_blank">Samandari</a></p>
    </div>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/apps.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
